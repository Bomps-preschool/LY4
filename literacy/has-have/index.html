<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build the Has-Have House</title>


<style>

*{
box-sizing:border-box;
}


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:"Comic Sans MS","Trebuchet MS",sans-serif;

}



/* ---------------- LOGO ---------------- */


#logoScreen{

position:fixed;

top:0;
left:0;

width:100%;
height:100vh;

background:white;

display:flex;

justify-content:center;

align-items:center;

z-index:1000;

}


#logoScreen img{

width:260px;

max-width:70%;

}



/* ---------------- ALL SCREENS ---------------- */


.screen{

position:fixed;

top:0;
left:0;

width:100%;
height:100vh;

display:none;

}



/* ---------------- INTRO ---------------- */


#introScreen{

display:flex;

background:white;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}



.introBox{

width:90%;

max-width:950px;

background:white;

border:4px solid #e6a3c2;

border-radius:30px;

padding:30px;

}



.title{

font-size:48px;

color:#d84f91;

}



.subtitle{

font-size:26px;

color:#51438b;

}



.instructionBox{

border:3px solid #e6a3c2;

border-radius:25px;

padding:20px;

font-size:22px;

color:#51438b;

}



.startBtn{

margin-top:25px;

background:#7bbf8c;

border:none;

color:white;

font-size:28px;

padding:15px 45px;

border-radius:30px;

cursor:pointer;

}




/* ---------------- GAME ---------------- */


#gameScreen{


display:flex;

background:url("assets/background.png");

background-size:cover;

background-position:center;

padding:10px;

flex-direction:column;

}



.header{


display:flex;

justify-content:space-between;

align-items:center;


background:white;

border:3px solid #e6a3c2;

border-radius:20px;

padding:10px 20px;


}



.gameTitle{

font-size:32px;

color:#d84f91;

font-weight:bold;

}


.score{

font-size:25px;

color:#51438b;

}




.progress{

text-align:center;

font-size:22px;

color:#51438b;

}



.questionBox{

display:none;

}




.mainArea{


height:calc(100vh - 150px);

display:flex;

justify-content:center;

align-items:center;

gap:25px;

overflow:hidden;

}



/* ---------------- PICTURE ---------------- */


.pictureArea{


width:55%;

height:85%;

max-height:520px;


background:white;

border:4px solid #e6a3c2;

border-radius:30px;


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


}



.pictureArea img{


width:80%;

height:65%;

max-height:300px;

object-fit:contain;


}




.sentence{


font-size:34px;

color:#51438b;

margin-top:15px;

}



.blank{


display:inline-block;

width:120px;

border-bottom:5px solid #d84f91;

}



/* ---------------- HOUSE ---------------- */




.houseArea{


width:40%;

height:85%;

max-height:520px;


background:white;

border:4px solid #e6a3c2;

border-radius:30px;


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


}




.houseContainer{

display:flex;

gap:20px;

}



.house{

width:180px;

cursor:pointer;

transition:.3s;

}


.house:hover{

transform:scale(1.08);

}


.correctHouse{

animation:bounce .7s;

}



@keyframes bounce{

50%{

transform:translateY(-20px);

}

}




.wordArea{


display:flex;

gap:20px;

margin-top:30px;


}



.word{


background:#ffe89c;

border:3px solid #dcae35;

border-radius:20px;


padding:15px 35px;


font-size:30px;

font-weight:bold;

color:#51438b;


cursor:pointer;


}



.selected{


transform:scale(1.1);

background:#ffd45a;

}




.message{

font-size:28px;

color:#d84f91;

font-weight:bold;

margin-top:20px;

}




/* ---------------- CHILD ---------------- */


.movingChild{


position:absolute;

width:90px;

display:none;


}



.walk{


animation:walk 1.5s forwards;

}



@keyframes walk{


from{

left:5%;

}


to{

left:70%;

}


}





/* ---------------- END SCREEN ---------------- */


#endScreen{


background:white;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

z-index:999;


}



.endBox{


border:4px solid #e6a3c2;

border-radius:30px;

padding:40px;


}



.endBox h1{


font-size:60px;

color:#d84f91;


}



.badge{


background:#ffe89c;

border:4px solid #dcae35;

border-radius:40px;

padding:20px;

font-size:35px;

color:#51438b;


}



.playAgain{


margin-top:30px;

padding:15px 45px;

font-size:28px;

border:none;

border-radius:30px;

background:#7bbf8c;

color:white;


}




canvas{

position:fixed;

top:0;
left:0;

pointer-events:none;

}





/* MOBILE / TABLET / IOS / ANDROID */


@media(max-width:1100px){


.mainArea{

height:calc(100vh - 170px);

}



.pictureArea img{

max-height:230px;

}



.house{

width:140px;

}



.word{

font-size:24px;

padding:12px 25px;

}


}



@media(max-width:700px){


.mainArea{

flex-direction:column;

height:calc(100vh - 160px);

}



.pictureArea,
.houseArea{

width:95%;

height:45%;

}



.pictureArea img{

height:55%;

}



.house{

width:100px;

}



.word{

font-size:20px;

padding:10px 20px;

}



.sentence{

font-size:24px;

}



.title{

font-size:35px;

}


}


</style>

</head>
<script>

const questions=[

{
img:"cat-ball.png",
sentence:"The cat ___ a blue ball.",
answer:"has"
},

{
img:"girl-flowers.png",
sentence:"She ___ beautiful flowers.",
answer:"has"
},

{
img:"children-playground.png",
sentence:"They ___ a big playground.",
answer:"have"
},

{
img:"family-car.png",
sentence:"We ___ a new car.",
answer:"have"
},

{
img:"bird-wings.png",
sentence:"It ___ small wings.",
answer:"has"
},

{
img:"girl-storybook.png",
sentence:"She ___ an interesting book.",
answer:"has"
},

{
img:"boy-crayons.png",
sentence:"He ___ many crayons.",
answer:"has"
},

{
img:"children-balloons.png",
sentence:"They ___ colourful balloons.",
answer:"have"
},

{
img:"teacher-books.png",
sentence:"She ___ many books.",
answer:"has"
},

{
img:"child-toys.png",
sentence:"I ___ three toys.",
answer:"have"
}

];


let current=0;
let score=0;
let selectedWord="";
let gameQuestions=[];




/* LOGO TIMER */

setTimeout(()=>{

document.getElementById("logoScreen").style.display="none";

document.getElementById("introScreen").style.display="flex";

},5000);





/* START GAME */


function startGame(){


document.getElementById("introScreen").style.display="none";


document.getElementById("gameScreen").style.display="flex";



gameQuestions=[...questions]
.sort(()=>Math.random()-0.5);



current=0;

score=0;


loadQuestion();


}






/* LOAD QUESTION */


function loadQuestion(){


let q=gameQuestions[current];



document.getElementById("qNo").innerHTML=current+1;


document.getElementById("score").innerHTML=score;



document.getElementById("picture").src=
"assets/"+q.img;



let parts=q.sentence.split("___");



document.getElementById("sentence").innerHTML=

parts[0]+
" <span class='blank'></span> "+
parts[1];



document.getElementById("message").innerHTML="";



selectedWord="";



document.querySelectorAll(".word")
.forEach(w=>{

w.classList.remove("selected");

});



document.querySelectorAll(".house")
.forEach(h=>{

h.classList.remove("correctHouse");

});


}





/* WORD SELECT */


document.getElementById("word1").onclick=function(){

selectWord("has");

};



document.getElementById("word2").onclick=function(){

selectWord("have");

};





function selectWord(word){


selectedWord=word;



document.querySelectorAll(".word")
.forEach(w=>{

w.classList.remove("selected");

});



if(word==="has"){

document.getElementById("word1")
.classList.add("selected");

}

else{

document.getElementById("word2")
.classList.add("selected");

}



document.getElementById("message").innerHTML=
"Choose the correct house 🏠";


}





/* HOUSE CLICK */


document.getElementById("hasHouse").onclick=function(){

checkAnswer("has");

};



document.getElementById("haveHouse").onclick=function(){

checkAnswer("have");

};







/* CHECK ANSWER - FIXED */


function checkAnswer(choice){


if(selectedWord===""){

return;

}



let correct =
gameQuestions[current].answer;



// WORD + HOUSE BOTH SHOULD MATCH


if(selectedWord===correct && choice===correct){



score++;


document.getElementById("score").innerHTML=score;



document.getElementById("correctSound").play();



let house = 
correct==="has"

?

document.getElementById("hasHouse")

:

document.getElementById("haveHouse");



house.classList.add("correctHouse");



document.getElementById("message").innerHTML=
"⭐ Great Job!";



walkChild();



setTimeout(()=>{

nextQuestion();

},1600);



}

else{


document.getElementById("wrongSound").play();



document.getElementById("message").innerHTML=
"Oops! Try Again 😊";


}



selectedWord="";


document.querySelectorAll(".word")
.forEach(w=>{

w.classList.remove("selected");

});


}








/* CHILD WALK */


function walkChild(){


let child=document.getElementById("movingChild");



child.style.display="block";


child.classList.remove("walk");


void child.offsetWidth;


child.classList.add("walk");



setTimeout(()=>{


child.style.display="none";

child.classList.remove("walk");


},1500);


}







/* NEXT QUESTION */


function nextQuestion(){


current++;



if(current>=gameQuestions.length){


finishGame();


}

else{


loadQuestion();


}


}







/* END SCREEN FIXED */


function finishGame(){


document.getElementById("gameScreen")
.style.display="none";


document.getElementById("endScreen")
.style.display="flex";



document.getElementById("endScreen")
.style.zIndex="9999";



document.getElementById("finalScore")
.innerHTML=
"⭐ Score: "+score+"/10";



document.getElementById("clapSound").play();



launchConfetti();


}






/* PLAY AGAIN */


function restartGame(){


document.getElementById("endScreen")
.style.display="none";


document.getElementById("gameScreen")
.style.display="flex";



current=0;

score=0;



gameQuestions=[...questions]
.sort(()=>Math.random()-0.5);



loadQuestion();


}







/* CONFETTI */


function launchConfetti(){


let canvas=document.getElementById("confetti");

let ctx=canvas.getContext("2d");



canvas.width=window.innerWidth;

canvas.height=window.innerHeight;



let pieces=[];



for(let i=0;i<100;i++){


pieces.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*8+3,

speed:Math.random()*3+2

});


}





function draw(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



pieces.forEach(p=>{


ctx.fillStyle="#d84f91";


ctx.fillRect(
p.x,
p.y,
p.size,
p.size
);



p.y+=p.speed;



if(p.y>canvas.height){

p.y=0;

}


});



requestAnimationFrame(draw);


}



draw();


}

</script>
<!-- END SCREEN -->

<div id="endScreen" class="screen">


<div class="endBox">


<h1>

🎉 Well Done!

</h1>



<div class="badge">

🏆 Has-Have Hero

</div>



<h2 id="finalScore"></h2>



<p style="
font-size:28px;
color:#51438b;
">

Excellent Grammar Explorer! ⭐

</p>



<button class="playAgain" onclick="restartGame()">

Play Again

</button>



</div>


</div>





<!-- AUDIO FILES -->


<audio id="correctSound" src="assets/correct.mp3"></audio>

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<audio id="clapSound" src="assets/claps.mp3"></audio>





<!-- CONFETTI -->


<canvas id="confetti"></canvas>



</body>

</html>
