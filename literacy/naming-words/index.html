<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Words Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Comic Sans MS', cursive, sans-serif; }
  body { background: #ffd6e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #game-container { width: 100%; max-width: 720px; text-align: center; position: relative; }
  .slide { display: none; width: 100%; }
  .active { display: block; }
  img.noun-img { max-width: 80%; height: auto; margin: 20px 0; border-radius: 15px; }
  #instruction { font-size: 1.4rem; margin: 15px 0; }
  .options { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
  .option-btn { padding: 15px 25px; font-size: 1.2rem; border-radius: 10px; border: 2px solid #333; cursor: pointer; background: #fff; transition: 0.2s; }
  .option-btn:hover { background: #ffe0e6; }
  #voice-icon { width: 60px; height: 60px; position: absolute; left: -70px; top: 50%; transform: translateY(-50%); cursor: pointer; }
  #logo-slide img { width: 300px; margin-top: 20%; }
  #well-done { font-size: 2rem; margin-bottom: 20px; }
  #play-again { padding: 15px 25px; font-size: 1.5rem; border-radius: 15px; cursor: pointer; background: #ffeb3b; border: 2px solid #333; }
  canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="game-container">

  <!-- Slide 1: Innovine Logo -->
  <div class="slide active" id="logo-slide">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
  </div>

  <!-- Slides 2-9: Nouns -->
  <div class="slide" id="slide-noun">
    <div id="instruction">Look at the picture and choose the correct type</div>
    <img id="noun-img" class="noun-img" src="" alt="noun">
    <img id="voice-icon" src="assets/voice-icon.png" alt="voice">
    <div class="options">
      <button class="option-btn" data-value="person">Person</button>
      <button class="option-btn" data-value="place">Place</button>
      <button class="option-btn" data-value="thing">Thing</button>
      <button class="option-btn" data-value="animal">Animal</button>
    </div>
  </div>

  <!-- Slide 10: Well Done -->
  <div class="slide" id="slide-well-done">
    <div id="well-done">🎉 Well Done! 🎉</div>
    <button id="play-again">Play Again</button>
    <canvas id="confetti-canvas"></canvas>
  </div>

</div>

<audio id="audio-correct" src="assets/excellent.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-noun"></audio>

<script>
const nouns = [
  { name: 'girl', type: 'person' },
  { name: 'cat', type: 'animal' },
  { name: 'mall', type: 'place' },
  { name: 'river', type: 'place' },
  { name: 'doctor', type: 'person' },
  { name: 'sheep', type: 'animal' },
  { name: 'zoo', type: 'place' },
  { name: 'book', type: 'thing' }
];

let currentSlide = 0;
const logoSlideTime = 5000;

const slides = document.querySelectorAll('.slide');
const nounImg = document.getElementById('noun-img');
const optionButtons = document.querySelectorAll('.option-btn');
const voiceIcon = document.getElementById('voice-icon');
const audioNoun = document.getElementById('audio-noun');
const audioCorrect = document.getElementById('audio-correct');
const audioWrong = document.getElementById('audio-wrong');

function showSlide(index) {
  slides.forEach(s => s.classList.remove('active'));
  if(index < nouns.length) {
    slides[1].classList.add('active'); // noun slide
    loadNoun(index);
  } else {
    slides[slides.length-1].classList.add('active'); // well done
    startConfetti();
  }
}

function loadNoun(index) {
  const noun = nouns[index];
  nounImg.src = `assets/${noun.name}.png`;
  nounImg.alt = noun.name;
  audioNoun.src = `assets/${noun.name}.mp3`;
  playAudioOnce = false;
}

let playAudioOnce = false;
voiceIcon.onclick = () => {
  audioNoun.currentTime = 0;
  audioNoun.play();
};

optionButtons.forEach(btn => {
  btn.onclick = () => {
    const correctType = nouns[currentSlide].type;
    if(btn.dataset.value === correctType) {
      audioCorrect.currentTime = 0;
      audioCorrect.play();
      currentSlide++;
      showSlide(currentSlide);
    } else {
      audioWrong.currentTime = 0;
      audioWrong.play();
    }
  }
});

// Logo slide first
setTimeout(() => {
  currentSlide = 0;
  showSlide(currentSlide);
}, logoSlideTime);

// Play Again button
document.getElementById('play-again').onclick = () => {
  currentSlide = 0;
  stopConfetti();
  showSlide(currentSlide);
};

// Confetti setup
let confettiCanvas, confettiCtx, confettiParticles = [], confettiInterval;

function startConfetti() {
  confettiCanvas = document.getElementById('confetti-canvas');
  confettiCtx = confettiCanvas.getContext('2d');
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  confettiParticles = [];
  for(let i=0; i<150; i++) {
    confettiParticles.push({
      x: Math.random()*confettiCanvas.width,
      y: Math.random()*confettiCanvas.height,
      r: Math.random()*6+4,
      d: Math.random()*50+10,
      color: `hsl(${Math.random()*360},70%,60%)`,
      tilt: Math.random()*10-10,
      tiltAngleIncrement: Math.random()*0.07+0.05
    });
  }
  confettiInterval = setInterval(drawConfetti, 20);
}

function drawConfetti() {
  confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles.forEach(p => {
    confettiCtx.beginPath();
    confettiCtx.lineWidth = p.r;
    confettiCtx.strokeStyle = p.color;
    confettiCtx.moveTo(p.x+p.tilt+p.r/2,p.y);
    confettiCtx.lineTo(p.x+p.tilt,p.y+p.tilt+ p.r/2);
    confettiCtx.stroke();
    p.tilt += p.tiltAngleIncrement;
    p.y += (Math.cos(p.d)+1+ p.r/2)/2;
    if(p.y>confettiCanvas.height) {
      p.y = -10;
      p.x = Math.random()*confettiCanvas.width;
    }
  });
}

function stopConfetti() {
  clearInterval(confettiInterval);
  confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
}
</script>
</body>
</html>
