<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Naming Words Game</title>
<style>
  body {
    background: #ffd6e0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: radial-gradient(circle at top left, rgba(255,255,255,0.3), transparent 70%);
    z-index:0;
  }

  #game-container {
    position: relative;
    z-index:1;
    width: 100%;
    max-width: 720px;
    text-align: center;
  }

  #instruction {
    font-size: 1.6rem;
    margin: 15px 0 10px 0;
    background: rgba(255,255,255,0.6);
    display: inline-block;
    padding: 10px 20px;
    border-radius: 10px;
  }

  #logo-slide img {
    width: 250px;
    margin-top: 50px;
  }

  .slide img.main-img {
    width: 250px;
    height: auto;
    margin-top: 20px;
    border-radius: 10px;
  }

  .options {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .option-btn {
    padding: 15px 25px;
    font-size: 1.2rem;
    border-radius: 10px;
    border: 2px solid #555;
    cursor: pointer;
    background-color: #f5f5f5;
    transition: transform 0.2s;
  }

  .option-btn:hover {
    transform: scale(1.05);
  }

  .voice-icon {
    width: 60px;
    height: 60px;
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
  }

  #well-done {
    font-size: 2rem;
    margin-top: 50px;
  }

  #play-again {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 1.5rem;
    border-radius: 10px;
    cursor: pointer;
  }

  canvas {
    position: absolute;
    top:0;
    left:0;
    pointer-events: none;
  }

</style>
</head>
<body>
<div id="game-container">

  <!-- Slide 1: Logo -->
  <div class="slide" id="logo-slide">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
  </div>

  <!-- Dynamic slides for nouns -->
  <div class="slide" id="game-slide" style="display:none;">
    <div id="instruction">Look at the picture and choose the correct type</div>
    <img src="" alt="noun" class="main-img" id="main-img">
    <img src="assets/voice-icon.png" class="voice-icon" id="voice-btn">
    <div class="options" id="options"></div>
  </div>

  <!-- Well Done Slide -->
  <div class="slide" id="end-slide" style="display:none;">
    <div id="well-done">🎉 Well Done! 🎉</div>
    <button id="play-again">Play Again</button>
    <canvas id="confetti-canvas"></canvas>
  </div>

</div>

<audio id="right-sound" src="assets/excellent.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>

<script>
const slidesData = [
  {img:"assets/girl.png", audio:"assets/girl.mp3", options:["Person","Place","Thing","Animal"], correct:"Person"},
  {img:"assets/cat.png", audio:"assets/cat.mp3", options:["Person","Place","Thing","Animal"], correct:"Animal"},
  {img:"assets/mall.png", audio:"assets/mall.mp3", options:["Person","Place","Thing","Animal"], correct:"Place"},
  {img:"assets/river.png", audio:"assets/river.mp3", options:["Person","Place","Thing","Animal"], correct:"Place"},
  {img:"assets/doctor.png", audio:"assets/doctor.mp3", options:["Person","Place","Thing","Animal"], correct:"Person"},
  {img:"assets/sheep.png", audio:"assets/sheep.mp3", options:["Person","Place","Thing","Animal"], correct:"Animal"},
  {img:"assets/zoo.png", audio:"assets/zoo.mp3", options:["Person","Place","Thing","Animal"], correct:"Place"},
  {img:"assets/book.png", audio:"assets/book.mp3", options:["Person","Place","Thing","Animal"], correct:"Thing"}
];

let currentIndex = -1;
const logoSlide = document.getElementById("logo-slide");
const gameSlide = document.getElementById("game-slide");
const mainImg = document.getElementById("main-img");
const optionsContainer = document.getElementById("options");
const voiceBtn = document.getElementById("voice-btn");
const rightSound = document.getElementById("right-sound");
const wrongSound = document.getElementById("wrong-sound");
const endSlide = document.getElementById("end-slide");
const playAgain = document.getElementById("play-again");
const confettiCanvas = document.getElementById("confetti-canvas");

// Show logo for 5 seconds
setTimeout(() => {
  logoSlide.style.display = "none";
  nextSlide();
}, 5000);

function nextSlide() {
  currentIndex++;
  if(currentIndex >= slidesData.length){
    showEndSlide();
    return;
  }
  const data = slidesData[currentIndex];
  mainImg.src = data.img;
  mainImg.alt = "noun image";
  gameSlide.style.display = "block";
  optionsContainer.innerHTML = "";
  data.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.classList.add("option-btn");
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    optionsContainer.appendChild(btn);
  });
}

function checkAnswer(selected){
  const correct = slidesData[currentIndex].correct;
  if(selected === correct){
    rightSound.currentTime = 0;
    rightSound.play();
    nextSlide();
  }else{
    wrongSound.currentTime = 0;
    wrongSound.play();
  }
}

voiceBtn.addEventListener("click",()=>{
  const data = slidesData[currentIndex];
  const audio = new Audio(data.audio);
  audio.play();
});

playAgain.addEventListener("click",()=>{
  currentIndex = -1;
  endSlide.style.display = "none";
  nextSlide();
});

function showEndSlide(){
  gameSlide.style.display = "none";
  endSlide.style.display = "block";
  startConfetti();
}

// Simple confetti
function startConfetti(){
  const ctx = confettiCanvas.getContext("2d");
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  const confettiCount = 150;
  const confettis = [];
  for(let i=0;i<confettiCount;i++){
    confettis.push({
      x:Math.random()*confettiCanvas.width,
      y:Math.random()*-confettiCanvas.height,
      r: Math.random()*6+4,
      d:Math.random()*confettiCanvas.height,
      color:`hsl(${Math.random()*360},100%,50%)`,
      tilt:Math.random()*10-10
    });
  }

  function draw(){
    ctx.clearRect(0,0,confettiCanvas.width, confettiCanvas.height);
    confettis.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth = c.r;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x + c.tilt + c.r/2, c.y);
      ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r/2);
      ctx.stroke();
      c.y += 2 + c.d/50;
      if(c.y > confettiCanvas.height){
        c.y = -10;
        c.x = Math.random()*confettiCanvas.width;
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
