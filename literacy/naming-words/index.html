<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Words Game</title>
<style>
body, html {
    margin:0; padding:0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: #ffe0e0;
}
#game-container {
    width: 100%;
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
}
img {
    max-width: 80%;
    height:auto;
}
button {
    font-size: 24px;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
}
#voice-btn {
    width: 100px;
    height: 100px;
    margin-top: 20px;
    cursor:pointer;
}
#good-job {
    font-size: 60px;
    font-weight: bold;
    text-align: center;
}
#play-again {
    font-size: 30px;
    padding: 15px 30px;
    margin-top: 20px;
    border-radius: 10px;
    cursor: pointer;
}
#confetti-canvas {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}
</style>
</head>
<body>

<div id="game-container">
    <img id="logo" src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<canvas id="confetti-canvas"></canvas>

<script>
const slides = [
    { img:"assets/girl.png", audio:"assets/girl.mp3", answer:"person" },
    { img:"assets/cat.png", audio:"assets/cat.mp3", answer:"animal" },
    { img:"assets/mall.png", audio:"assets/mall.mp3", answer:"place" },
    { img:"assets/river.png", audio:"assets/river.mp3", answer:"place" },
    { img:"assets/doctor.png", audio:"assets/doctor.mp3", answer:"person" },
    { img:"assets/sheep.png", audio:"assets/sheep.mp3", answer:"animal" },
    { img:"assets/zoo.png", audio:"assets/zoo.mp3", answer:"place" },
    { img:"assets/book.png", audio:"assets/book.mp3", answer:"thing" }
];

const gameContainer = document.getElementById("game-container");
let currentSlide = -1;

// Preload audio
const sounds = {
    correct: new Audio("assets/correct.mp3"),
    wrong: new Audio("assets/wrong.mp3"),
    excellent: new Audio("assets/excellent.mp3")
};

// Start with logo
setTimeout(() => {
    nextSlide();
}, 5000);

function nextSlide() {
    currentSlide++;
    gameContainer.innerHTML = "";
    if(currentSlide < slides.length){
        showQuestion(slides[currentSlide]);
    } else {
        showCompletion();
    }
}

function showQuestion(slide){
    // Image
    const imgEl = document.createElement("img");
    imgEl.src = slide.img;
    gameContainer.appendChild(imgEl);

    // Voice icon
    const voiceBtn = document.createElement("img");
    voiceBtn.src = "assets/voice-icon.png";
    voiceBtn.id = "voice-btn";
    voiceBtn.onclick = ()=> {
        const voice = new Audio(slide.audio);
        voice.play();
    }
    gameContainer.appendChild(voiceBtn);

    // Buttons
    const options = ["person","place","thing","animal"];
    options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => {
            if(opt === slide.answer){
                sounds.excellent.play();
                nextSlide();
            } else {
                sounds.wrong.play();
            }
        }
        gameContainer.appendChild(btn);
    });
}

function showCompletion(){
    gameContainer.innerHTML = "";
    const msg = document.createElement("div");
    msg.id = "good-job";
    msg.innerText = "Good Job!";
    gameContainer.appendChild(msg);

    const playAgain = document.createElement("button");
    playAgain.id = "play-again";
    playAgain.innerText = "Play Again";
    playAgain.onclick = () => {
        currentSlide = -1;
        nextSlide();
    }
    gameContainer.appendChild(playAgain);

    // Confetti effect
    launchConfetti();
}

// Simple confetti effect
function launchConfetti() {
    const canvas = document.getElementById("confetti-canvas");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext("2d");
    let particles = [];
    for(let i=0;i<200;i++){
        particles.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*6+4,
            d: Math.random()*30+10,
            color: `hsl(${Math.random()*360}, 70%, 50%)`,
            tilt: Math.random()*10-10
        });
    }
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{
            ctx.beginPath();
            ctx.fillStyle = p.color;
            ctx.moveTo(p.x + p.tilt, p.y);
            ctx.lineTo(p.x + p.tilt + 4, p.y + p.r);
            ctx.lineTo(p.x + p.tilt - 4, p.y + p.r);
            ctx.closePath();
            ctx.fill();

            p.y += 2;
            if(p.y > canvas.height){ p.y = -10; p.x = Math.random()*canvas.width; }
        });
        requestAnimationFrame(draw);
    }
    draw();
}

</script>
</body>
</html>
