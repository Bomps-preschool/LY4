<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Family Game</title>
<style>
body, html { margin:0; padding:0; font-family:'Comic Sans MS', cursive,sans-serif; overflow:hidden; }
.instruction-top { width:100%; text-align:center; font-size:1.8em; color:#fff; font-weight:bold; padding:15px; background:linear-gradient(135deg,#ff9999,#ff4d4d,#ffcccc); }
.slide { width:100vw; height:calc(100vh - 60px); display:none; justify-content:center; align-items:center; flex-direction:column; position:relative; transition: all 0.5s; margin-top:60px; }
.active { display:flex; }
#splash img, .picture img { width:250px; height:auto; transition: transform 1s ease-in-out; }
#splash img:hover, .picture img:hover { transform: scale(1.1); }

.picture img { width:200px; height:auto; margin-bottom:20px; }
.letter-boxes { display:flex; gap:10px; margin-bottom:20px; }
.letter-box { width:50px; height:50px; border:2px solid #fff; display:flex; justify-content:center; align-items:center; font-size:24px; font-weight:bold; background:linear-gradient(135deg,#ffcccc,#ff9999); box-shadow:0 0 5px #ff6666; transition: all 0.3s; }
.letter-box.correct { box-shadow:0 0 10px #2e8b57; background:linear-gradient(135deg,#ffb3b3,#ff8080); }

.letter-buttons { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:80vw; }
.letter-buttons button { padding:10px 15px; font-size:20px; cursor:pointer; background:linear-gradient(135deg,#ff6666,#ff4d4d); border:none; border-radius:8px; color:#fff; transition: all 0.3s; animation: bounce 2s infinite; }
.letter-buttons button:hover { transform:scale(1.1); box-shadow:0 0 10px #2e8b57; background:linear-gradient(135deg,#ff8080,#ff3333); }

#end { font-size:2em; color:#fff; text-align:center; margin-top:60px; }
canvas { position:absolute; top:0; left:0; pointer-events:none; }

/* Background gradient with 3 shades of red/pink */
body { background: linear-gradient(135deg,#ff9999,#ff4d4d,#ffcccc); background-size:400% 400%; animation:bgAnimate 15s ease infinite; }
@keyframes bgAnimate{ 0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;} }

/* Animations */
@keyframes bounce{ 0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);} }
</style>
</head>
<body>

<!-- Instruction on top -->
<div class="instruction-top">
Click the letters in the correct order to form the word that matches the picture below. Have fun learning word families!
</div>

<!-- Splash -->
<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Slides -->
<div id="game-slides"></div>

<!-- End Slide -->
<div class="slide" id="end">
  <h1>Good Job!</h1>
  <canvas id="confetti"></canvas>
</div>

<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="assets/excellent.mp3"></audio>
<audio id="bg-music" src="assets/background-melody.mp3" loop autoplay></audio>

<script>
// Word data
const words = [
  {word:'hat', img:'assets/hat.png'},
  {word:'leg', img:'assets/leg.png'},
  {word:'mop', img:'assets/mop.png'},
  {word:'bun', img:'assets/bun.png'},
  {word:'zip', img:'assets/zip.png'},
  {word:'jet', img:'assets/jet.png'},
  {word:'cub', img:'assets/cub.png'},
  {word:'jam', img:'assets/jam.png'},
  {word:'dig', img:'assets/dig.png'},
  {word:'log', img:'assets/log.png'}
];

// Generate slides
const gameSlidesContainer = document.getElementById('game-slides');
words.forEach((item,index)=>{
  const slide = document.createElement('div');
  slide.classList.add('slide');
  slide.dataset.word=item.word;
  slide.innerHTML=`
    <div class="picture"><img src="${item.img}" alt="${item.word}"></div>
    <div class="letter-boxes" id="boxes-${index}"></div>
    <div class="letter-buttons" id="buttons-${index}"></div>
  `;
  gameSlidesContainer.appendChild(slide);
});

const slides = document.querySelectorAll('.slide');
let currentSlide=0;

// Show a slide
function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');
}

// Splash 5s → first word
setTimeout(()=>{
  showSlide(1); // Show first word slide
  initSlide(0);
},5000);

// Shuffle helper
function shuffleArray(arr){ return arr.sort(()=>Math.random()-0.5); }

// Initialize a word slide with selective shuffle
function initSlide(index){
  const slide = slides[index+1]; // skip splash
  const word = words[index].word;
  const boxesContainer = slide.querySelector(`#boxes-${index}`);
  const buttonsContainer = slide.querySelector(`#buttons-${index}`);
  boxesContainer.innerHTML='';
  buttonsContainer.innerHTML='';

  // Create letter boxes
  for(let i=0;i<word.length;i++){
    const box=document.createElement('div');
    box.classList.add('letter-box');
    boxesContainer.appendChild(box);
  }

  // Shuffle letters for all words
  let lettersArray=word.split('');
  lettersArray=shuffleArray(lettersArray);

  // Create letter buttons
  lettersArray.forEach(l=>{
    const btn=document.createElement('button');
    btn.textContent=l;
    btn.addEventListener('click',()=>{
      const emptyBox=Array.from(boxesContainer.children).find(b=>b.textContent==='');
      if(emptyBox){
        emptyBox.textContent=l;
        const formedWord=Array.from(boxesContainer.children).map(b=>b.textContent).join('');
        if(formedWord.length===word.length){
          if(formedWord===word){
            document.getElementById('audio-correct').play();
            Array.from(boxesContainer.children).forEach(b=>b.classList.add('correct'));
            setTimeout(()=>{
              if(index+1<words.length){
                initSlide(index+1);
                showSlide(index+2+index);
              }else showEndSlide();
            },700);
          }else{
            document.getElementById('audio-wrong').play();
            Array.from(boxesContainer.children).forEach(b=>b.textContent='');
          }
        }
      }
    });
    buttonsContainer.appendChild(btn);
  });
}

// End Slide + Confetti
function showEndSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  document.getElementById('end').classList.add('active');
  document.getElementById('audio-excellent').play();
  launchConfetti();
}

// Confetti animation
function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*20+10, color:['#ff6666','#ffcccc','#ff9999'][Math.floor(Math.random()*3)], tilt:Math.random()*10-10, tiltAngleIncrement:Math.random()*0.07+0.05});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();
      c.tilt+=c.tiltAngleIncrement;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;
      if(c.y>canvas.height){c.y=-10;c.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
