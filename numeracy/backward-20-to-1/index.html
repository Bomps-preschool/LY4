<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backward Counting Rockets</title>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Comic Sans MS', sans-serif;
        background: url('assets/background-space.png') no-repeat center center;
        background-size: cover;
    }
    #gameCanvas {
        display: block;
        margin: 0 auto;
        background: transparent;
    }
    #instruction {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        color: #00cc66;
        font-size: 22px;
        font-weight: bold;
        text-shadow: 1px 1px #fff;
        z-index: 10;
    }
</style>
</head>
<body>

<div id="instruction">Tap the rockets in backward order from 20 to 1!</div>
<canvas id="gameCanvas" width="1200" height="700"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const rocketImg = new Image();
rocketImg.src = 'assets/rocket.png';

const flameImg = new Image();
flameImg.src = 'assets/flame.png';

const correctSound = new Audio('assets/correct.mp3');
const wrongSound = new Audio('assets/wrong.mp3');

const rocketCount = 20;
let rockets = [];
let clickedIndex = 0;

// Utility: Random integer
function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Create rockets with non-overlapping positions
function createRockets() {
    rockets = [];
    let attempts = 0;
    while (rockets.length < rocketCount && attempts < 1000) {
        const x = randInt(50, canvas.width - 100);
        const y = randInt(100, canvas.height - 150);
        const size = 70;
        let overlap = rockets.some(r => Math.hypot(r.x - x, r.y - y) < 80);
        if (!overlap) {
            rockets.push({x, y, size, number: 20 - rockets.length, clicked: false});
        }
        attempts++;
    }
}

// Draw rockets with flame and number
function drawRockets() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    rockets.forEach(r => {
        if (!r.clicked) {
            ctx.drawImage(rocketImg, r.x, r.y, r.size, r.size);
            // flame animation
            ctx.drawImage(flameImg, r.x + r.size/4, r.y + r.size, r.size/2, r.size/2);
            // number
            ctx.fillStyle = 'white';
            ctx.font = 'bold 22px Comic Sans MS';
            ctx.textAlign = 'center';
            ctx.fillText(r.number, r.x + r.size/2, r.y + r.size/2 + 8);
        }
    });
}

// Handle canvas clicks
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    rockets.forEach(r => {
        if (!r.clicked && mouseX >= r.x && mouseX <= r.x + r.size &&
            mouseY >= r.y && mouseY <= r.y + r.size) {
            if (r.number === 20 - clickedIndex) {
                r.clicked = true;
                correctSound.currentTime = 0;
                correctSound.play();
                clickedIndex++;
                if (clickedIndex === rocketCount) {
                    setTimeout(() => alert("🎉 Good Job! You counted backward correctly!"), 200);
                }
            } else {
                wrongSound.currentTime = 0;
                wrongSound.play();
            }
        }
    });
});

function animate() {
    drawRockets();
    requestAnimationFrame(animate);
}

// Initialize
createRockets();
animate();

</script>
</body>
</html>
