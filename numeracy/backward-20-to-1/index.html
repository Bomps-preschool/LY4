<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backward Counting Rockets</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; overflow:hidden; font-family: 'Comic Sans MS', sans-serif; }
  #logoSlide, #gameSlide, #endSlide { width:100%; height:100%; position:absolute; top:0; left:0; display:flex; justify-content:center; align-items:center; flex-direction:column; }
  #logoSlide img { width:300px; }
  #gameSlide { background:url('assets/background-space.png') no-repeat center center; background-size:cover; display:none; flex-direction:column; }
  #instruction { font-size:2rem; color:#3cf93c; margin-top:20px; text-align:center; }
  .rockets-row { display:flex; justify-content:center; margin:10px 0; flex-wrap:wrap; }
  .rocket { width:80px; margin:5px; position:relative; cursor:pointer; transition: transform 1s ease; }
  .rocket img { width:100%; }
  .rocket-number { position:absolute; top:10px; left:0; right:0; text-align:center; font-weight:bold; font-size:1.2rem; color:#00f; }
  #endSlide { background:url('assets/background-space.png') no-repeat center center; background-size:cover; display:none; flex-direction:column; color:#3cf93c; font-size:3rem; text-align:center; }
</style>
</head>
<body>

<!-- Innovine Logo Slide -->
<div id="logoSlide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Slide -->
<div id="gameSlide">
  <div id="instruction">Tap the rockets in backward order from 20 to 1!</div>
  <div id="rocketsContainer">
    <!-- Row 1 -->
    <div class="rockets-row" id="row1"></div>
    <!-- Row 2 -->
    <div class="rockets-row" id="row2"></div>
    <!-- Row 3 -->
    <div class="rockets-row" id="row3"></div>
  </div>
</div>

<!-- End Slide -->
<div id="endSlide">
  🎉 Good Job! 🎉
</div>

<script>
const logoSlide = document.getElementById('logoSlide');
const gameSlide = document.getElementById('gameSlide');
const endSlide = document.getElementById('endSlide');

const rocketOrder = [18,12,3,5,20,7,1,14,4, 15,2,6,19,11,10,8, 13,16,9,17]; // user specified order
let nextNumberIndex = 0;

// Map rocket number to asset image
const rocketAssets = {};
for(let i=1;i<=20;i++){
  rocketAssets[i] = `assets/rocket-number-${i}.png`;
}

// Rows
const row1 = document.getElementById('row1');
const row2 = document.getElementById('row2');
const row3 = document.getElementById('row3');
const rows = [row1,row2,row3];

// Place rockets
rocketOrder.forEach((num,index)=>{
  const rocketDiv = document.createElement('div');
  rocketDiv.classList.add('rocket');
  rocketDiv.dataset.num = num;

  const img = document.createElement('img');
  img.src = rocketAssets[num];
  rocketDiv.appendChild(img);

  const span = document.createElement('div');
  span.classList.add('rocket-number');
  span.textContent = num;
  rocketDiv.appendChild(span);

  // Distribute across rows
  if(index < 9) row1.appendChild(rocketDiv);
  else if(index < 16) row2.appendChild(rocketDiv);
  else row3.appendChild(rocketDiv);

  // Click handler
  rocketDiv.addEventListener('click', ()=>{
    if(parseInt(rocketDiv.dataset.num) === rocketOrder[nextNumberIndex]){
      nextNumberIndex++;
      rocketDiv.style.transform = 'translateY(-800px) rotate(20deg)';
      rocketDiv.style.opacity = '0';
      if(nextNumberIndex === rocketOrder.length){
        gameSlide.style.display='none';
        endSlide.style.display='flex';
      }
    } else {
      // Wrong click feedback
      rocketDiv.style.transform = 'translateX(-10px)';
      setTimeout(()=>{ rocketDiv.style.transform = 'translateX(0)'; },200);
      // Optional: play wrong sound
    }
  });
});

// Show game after 2 sec logo
setTimeout(()=>{
  logoSlide.style.display='none';
  gameSlide.style.display='flex';
},2000);

</script>
</body>
</html>
