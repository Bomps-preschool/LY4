<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backward Counting Rockets</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: url('assets/background-space.png') no-repeat center center fixed;
    background-size: cover;
  }

  #splash, #game, #end {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
  }

  #splash {
    display: flex;
    background: #fff;
  }

  #splash img {
    width: 200px;
    height: auto;
  }

  #game {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 50px;
  }

  #instruction {
    font-size: 2em;
    color: #00ff00;
    text-align: center;
    text-shadow: 1px 1px 2px #000;
    margin-bottom: 20px;
  }

  .rocket {
    position: absolute;
    width: 80px;
    cursor: pointer;
    transition: transform 1s ease-out;
  }

  #end {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 3em;
    color: #00ff00;
    text-shadow: 2px 2px 3px #000;
  }
</style>
</head>
<body>

<div id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="game">
  <div id="instruction">Tap the rockets in backward order from 20 to 1!</div>
</div>

<div id="end">
  <div>🎉 Good Job! 🎉</div>
</div>

<script>
const rocketsData = [
  {num: 18, src:'assets/rocket-number-18.png'},
  {num: 12, src:'assets/rocket-number-12.png'},
  {num: 3, src:'assets/rocket-number-3.png'},
  {num: 5, src:'assets/rocket-number-5.png'},
  {num: 20, src:'assets/rocket-number-20.png'},
  {num: 7, src:'assets/rocket-number-7.png'},
  {num: 1, src:'assets/rocket-number-1.png'},
  {num: 14, src:'assets/rocket-number-14.png'},
  {num: 4, src:'assets/rocket-number-4.png'},
  {num: 15, src:'assets/rocket-number-15.png'},
  {num: 2, src:'assets/rocket-number-2.png'},
  {num: 6, src:'assets/rocket-number-6.png'},
  {num: 19, src:'assets/rocket-number-19.png'},
  {num: 11, src:'assets/rocket-number-11.png'},
  {num: 10, src:'assets/rocket-number-10.png'},
  {num: 8, src:'assets/rocket-number-8.png'},
  {num: 13, src:'assets/rocket-number-13.png'},
  {num: 16, src:'assets/rocket-number-16.png'},
  {num: 9, src:'assets/rocket-number-9.png'},
  {num: 17, src:'assets/rocket-number-17.png'}
];

let nextNumber = 20;

const gameDiv = document.getElementById('game');

function createRockets() {
  rocketsData.forEach((rocket,i) => {
    const rocketEl = document.createElement('img');
    rocketEl.src = rocket.src;
    rocketEl.classList.add('rocket');
    rocketEl.dataset.num = rocket.num;
    
    // Place rockets in roughly 3 horizontal lines
    if(i < 9) {
      rocketEl.style.top = '100px';
      rocketEl.style.left = `${50 + i*100}px`;
    } else if(i < 16) {
      rocketEl.style.top = '250px';
      rocketEl.style.left = `${50 + (i-9)*100}px`;
    } else {
      rocketEl.style.top = '400px';
      rocketEl.style.left = `${50 + (i-16)*100}px`;
    }
    
    rocketEl.addEventListener('click', () => handleRocketClick(rocketEl));
    
    gameDiv.appendChild(rocketEl);
  });
}

function handleRocketClick(el) {
  if(Number(el.dataset.num) === nextNumber) {
    el.style.transform = 'translateY(-1500px)'; // rocket flies up
    nextNumber--;
    const audio = new Audio('assets/correct.mp3');
    audio.play();
    if(nextNumber === 0) {
      setTimeout(showEndScreen, 1200);
    }
  } else {
    const audio = new Audio('assets/wrong.mp3');
    audio.play();
  }
}

function showEndScreen() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('end').style.display = 'flex';
}

// Splash screen
const splash = document.getElementById('splash');
setTimeout(() => {
  splash.style.display = 'none';
  document.getElementById('game').style.display = 'block';
  createRockets();
}, 3000);

</script>
</body>
</html>
