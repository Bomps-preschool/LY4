<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Backward Counting Rockets 20-1</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Arial', sans-serif;
    }
    #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        background-size: cover;
        background-position: center;
    }
    .slide {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .visible { display: flex; }
    #slide1 img {
        width: 200px;
    }
    #instruction {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 2vw;
        color: #39FF14;
        text-shadow: 1px 1px 2px black;
    }
    .rocket {
        position: absolute;
        width: 70px;
        cursor: pointer;
        transition: transform 0.7s ease-in;
    }
    #goodjob {
        font-size: 4vw;
        color: #39FF14;
        text-align: center;
    }
</style>
</head>
<body>
<div id="game-container">
    <!-- Slide 1: Logo -->
    <div id="slide1" class="slide visible">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <!-- Slide 2: Game -->
    <div id="slide2" class="slide">
        <div id="instruction">Tap the rockets in backward order from 20 to 1!</div>
        <!-- Rockets will be inserted by JS -->
    </div>

    <!-- Slide 3: Good Job -->
    <div id="slide3" class="slide">
        <div id="goodjob">Good Job! 🎉</div>
    </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const rocketOrder = [18,12,3,5,20,7,1,14,4,15,2,6,19,11,10,8,13,16,9,17]; // Initial placement sequence
const rocketPositions = [
    {x:5, y:15},{x:15,y:15},{x:25,y:15},{x:35,y:15},{x:45,y:15},{x:55,y:15},{x:65,y:15},{x:75,y:15},{x:85,y:15},
    {x:10,y:35},{x:20,y:35},{x:30,y:35},{x:40,y:35},{x:50,y:35},{x:60,y:35},{x:70,y:35},
    {x:20,y:55},{x:40,y:55},{x:60,y:55},{x:80,y:55}
];

let backwardSequence = [...Array(20)].map((_,i)=>20-i); // 20 → 1
let currentIndex = 0;

function createRockets() {
    const slide2 = document.getElementById('slide2');
    rocketOrder.forEach((num, idx) => {
        const rocket = document.createElement('img');
        rocket.src = `assets/rocket-number-${num}.png`;
        rocket.classList.add('rocket');
        rocket.style.left = rocketPositions[idx].x + '%';
        rocket.style.top = rocketPositions[idx].y + '%';
        rocket.dataset.number = num;
        rocket.addEventListener('click', handleRocketClick);
        slide2.appendChild(rocket);
    });
}

function handleRocketClick(e) {
    const clickedNum = parseInt(this.dataset.number);
    // Check against backward sequence
    if (clickedNum === backwardSequence[currentIndex]) {
        document.getElementById('correctSound').play();
        this.style.transform = 'translateY(-1000px)';
        this.style.pointerEvents = 'none';
        currentIndex++;
        if (currentIndex >= backwardSequence.length) {
            setTimeout(() => { showSlide(3); }, 700);
        }
    } else {
        document.getElementById('wrongSound').play();
    }
}

function showSlide(slideNum) {
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('visible'));
    document.getElementById('slide' + slideNum).classList.add('visible');
}

function startGame() {
    showSlide(1);
    setTimeout(() => {
        document.getElementById('slide1').classList.remove('visible');
        document.getElementById('slide2').classList.add('visible');
    }, 3000); // Show logo for 3 seconds
}

window.onload = () => {
    document.getElementById('slide2').style.backgroundImage = "url('assets/background-space.png')";
    createRockets();
    startGame();
}
</script>
</body>
</html>
