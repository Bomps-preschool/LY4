<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backward Counting Rocket Game</title>
<style>
body, html {
  margin:0;
  padding:0;
  font-family: 'Arial', sans-serif;
  overflow:hidden;
}
/* Background animation */
body {
  background: url('assets/background-space.png') no-repeat center center fixed;
  background-size: cover;
}

#logoSlide, #gameSlide, #endSlide {
  position: absolute; top:0; left:0; right:0; bottom:0;
  width: 100%; height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#logoSlide img {
  width:300px;
  height:auto;
}

#gameSlide { display:flex; flex-direction:column; }
#numbers-container { position: relative; width: 100%; height: 100%; }

.rocket {
  position: absolute;
  width: 70px;
  cursor: pointer;
  transition: transform 0.3s;
}

.rocket:hover { transform: scale(1.1); }

#flame {
  position:absolute;
  width:50px;
  display:none;
  pointer-events:none;
}

#endSlide { display:flex; justify-content:center; align-items:center; flex-direction:column; background:linear-gradient(135deg,#ffddff,#ffe6cc);}
#confettiCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

</style>
</head>
<body>

<div id="logoSlide" style="display:flex;">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div id="gameSlide">
  <div id="numbers-container"></div>
  <img id="flame" src="assets/flame.png" alt="Flame">
</div>

<div id="endSlide">
  <canvas id="confettiCanvas"></canvas>
  <h1>🚀 Blast Off! Well Done! 🎉</h1>
  <button onclick="restartGame()" style="font-size:24px;padding:15px 25px;">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>
const logoSlide = document.getElementById('logoSlide');
const gameSlide = document.getElementById('gameSlide');
const numbersContainer = document.getElementById('numbers-container');
const flame = document.getElementById('flame');
const endSlide = document.getElementById('endSlide');

const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const clapSound = document.getElementById('clapSound');

let currentNumber = 20;

function showLogo(){
  logoSlide.style.display='flex';
  setTimeout(()=> {
    logoSlide.style.display='none';
    startGame();
  },5000);
}

function startGame(){
  gameSlide.style.display='flex';
  generateRockets();
}

function generateRockets(){
  numbersContainer.innerHTML='';
  currentNumber = 20;
  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight - 100;

  for(let i=20;i>=1;i--){
    const rocket = document.createElement('div');
    rocket.className='rocket';
    rocket.dataset.number=i;
    rocket.style.left = Math.random()*(screenWidth-80)+'px';
    rocket.style.top = Math.random()*(screenHeight-80)+'px';
    rocket.innerHTML=`<img src="assets/rocket.png" style="width:70px;"><span style="position:absolute;top:10px;left:15px;font-weight:bold;color:white;font-size:18px;">${i}</span>`;
    rocket.addEventListener('click', ()=>checkRocket(rocket));
    numbersContainer.appendChild(rocket);
  }
}

function checkRocket(rocket){
  const num = parseInt(rocket.dataset.number);
  if(num === currentNumber){
    correctSound.play();
    animateFlame(rocket);
    rocket.style.transform='scale(0)';
    currentNumber--;
    if(currentNumber === 0){
      setTimeout(showEndSlide,800);
    }
  } else {
    wrongSound.play();
    rocket.style.transform='scale(1.1)';
    setTimeout(()=>{rocket.style.transform='scale(1)';},300);
  }
}

function animateFlame(rocket){
  const rect = rocket.getBoundingClientRect();
  flame.style.left = rect.left + rect.width/2 - 25 + 'px';
  flame.style.top = rect.top + rect.height - 20 + 'px';
  flame.style.display='block';
  setTimeout(()=>{flame.style.display='none';},400);
}

function showEndSlide(){
  gameSlide.style.display='none';
  endSlide.style.display='flex';
  clapSound.play();
  launchConfetti();
}

function restartGame(){
  endSlide.style.display='none';
  startGame();
}

/* Confetti */
function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*20+10, color:`hsl(${Math.random()*360},100%,50%)`, tilt:Math.random()*10-10});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();
      c.tilt+=0.05;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;
      if(c.y>canvas.height){c.y=-10;c.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}

window.onload=showLogo;
</script>
</body>
</html>
