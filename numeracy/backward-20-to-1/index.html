<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backward Counting Rockets</title>
<style>
body, html {
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden;
    font-family:'Comic Sans MS', cursive, sans-serif;
}
#game-container {
    position: relative;
    width:100%;
    height:100%;
    background-image: url('assets/background-space.png');
    background-size: cover;
    background-position: center;
}
.rocket {
    position: absolute;
    width: 80px;
    cursor: pointer;
    transition: transform 0.3s;
}
.rocket:hover { transform: scale(1.1); }
#instruction {
    position:absolute;
    top:10px; width:100%;
    text-align:center;
    font-size:24px;
    color:#00ff99;
    font-weight:bold;
    text-shadow:1px 1px #000;
    z-index:1000;
}
</style>
</head>
<body>

<div id="game-container">
    <div id="instruction">Tap the rockets in backward order from 20 to 1!</div>
</div>

<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="clap-sound" src="assets/claps.mp3"></audio>

<script>
// Data for rockets
const rocketsData = [
    {number: 20, img:'assets/rocket-number-20.png'},
    {number: 19, img:'assets/rocket-number-19.png'},
    {number: 18, img:'assets/rocket-number-18.png'},
    {number: 17, img:'assets/rocket-number-17.png'},
    {number: 16, img:'assets/rocket-number-16.png'},
    {number: 15, img:'assets/rocket-number-15.png'},
    {number: 14, img:'assets/rocket-number-14.png'},
    {number: 13, img:'assets/rocket-number-13.png'},
    {number: 12, img:'assets/rocket-number-12.png'},
    {number: 11, img:'assets/rocket-number-11.png'},
    {number: 10, img:'assets/rocket-number-10.png'},
    {number: 9, img:'assets/rocket-number-9.png'},
    {number: 8, img:'assets/rocket-number-8.png'},
    {number: 7, img:'assets/rocket-number-7.png'},
    {number: 6, img:'assets/rocket-number-6.png'},
    {number: 5, img:'assets/rocket-number-5.png'},
    {number: 4, img:'assets/rocket-number-4.png'},
    {number: 3, img:'assets/rocket-number-3.png'},
    {number: 2, img:'assets/rocket-number-2.png'},
    {number: 1, img:'assets/rocket-number-1.png'}
];

let nextNumber = 20;
const container = document.getElementById('game-container');
const correctSound = document.getElementById('correct-sound');
const wrongSound = document.getElementById('wrong-sound');
const clapSound = document.getElementById('clap-sound');

// Shuffle rockets randomly
function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Create rockets on screen
function createRockets(){
    shuffleArray(rocketsData);
    rocketsData.forEach(rocket => {
        const el = document.createElement('img');
        el.src = rocket.img;
        el.className = 'rocket';
        el.dataset.number = rocket.number;

        // Random position within screen bounds
        el.style.left = Math.random()*(window.innerWidth-100) + 'px';
        el.style.top = Math.random()*(window.innerHeight-200)+ 'px';

        el.addEventListener('click', ()=> checkRocket(el));
        container.appendChild(el);
    });
}

// Rocket click handler
function checkRocket(el){
    const number = parseInt(el.dataset.number);
    if(number === nextNumber){
        correctSound.currentTime = 0;
        correctSound.play();
        // Animate rocket going up
        let pos = parseFloat(el.style.top);
        const interval = setInterval(()=>{
            pos -= 5;
            el.style.top = pos + 'px';
            if(pos < -100){
                clearInterval(interval);
                el.remove();
            }
        },20);
        nextNumber--;
        if(nextNumber===0){
            setTimeout(()=>{clapSound.play(); alert("🎉 Congratulations! You counted backward!");},500);
        }
    } else {
        wrongSound.currentTime = 0;
        wrongSound.play();
    }
}

window.addEventListener('load', ()=>{
    createRockets();
});
</script>
</body>
</html>
