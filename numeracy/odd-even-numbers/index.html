<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Odd Even Number Detective</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Comic Sans MS",sans-serif}
.screen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;text-align:center}
#logo{display:flex;background:white}
#logo img{width:260px}
#intro,#game,#end{background:linear-gradient(#fff3d6,#dff6ff,#f5e8ff);padding:15px}
.card{background:white;border:4px solid #6b5ca5;border-radius:30px;padding:25px;width:90%;max-width:900px}
h1{color:#6b5ca5}
p{font-size:22px;color:#394867}
button{font-family:inherit;cursor:pointer}
.start{background:#55b77b;color:white;border:0;border-radius:30px;padding:15px 40px;font-size:26px}
.header{position:absolute;top:10px;left:10px;right:10px;background:white;border-radius:25px;padding:10px 20px;display:flex;justify-content:space-between;color:#6b5ca5;font-size:22px}
.main{width:95%;height:75%;background:white;border:4px solid #d8b4fe;border-radius:35px;display:flex;align-items:center;justify-content:center;gap:40px}
.left,.right{width:45%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.detective{width:180px;height:200px;object-fit:contain}
.objects{font-size:50px;max-width:450px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.countText{font-size:25px;color:#6b5ca5}
.options{position:absolute;bottom:30px;display:flex;gap:30px}
.option{padding:15px 35px;border-radius:30px;border:0;font-size:25px}
.odd{background:#ffd166}.even{background:#a0e7e5}
.msg{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);font-size:25px;color:#e85d75;font-weight:bold;background:white;padding:10px 25px;border-radius:25px;border:3px solid #d8b4fe;z-index:10}
@media(max-width:700px){
.main{flex-direction:column;gap:5px;height:75%}
.left,.right{width:95%}
.detective{width:100px;height:110px}
.objects{font-size:32px}
.options{bottom:15px;gap:10px}
.option{font-size:20px;padding:10px 20px}
}
</style>
</head>
<body>

<div id="logo" class="screen"><img src="assets/innovine-logo.png"></div>

<div id="intro" class="screen">
<div class="card">
<img class="detective" src="assets/detective.png">
<h1>🔎 Number Detective</h1>
<p>Count the objects and find the Odd Number or Even Number.</p>
<p>If everyone has a partner → Even Number<br>If one is left alone → Odd Number</p>
<button class="start" onclick="startGame()">Start Investigation</button>
</div>
</div>

<div id="game" class="screen">
<div class="header"><b>🔎 Odd Even Number Detective</b><b>⭐ <span id="score">0</span>/10</b></div>

<div class="main">

<div class="left">
<img id="detective" class="detective" src="assets/detective-thinking.png">
<p>Detective is checking!</p>
</div>

<div class="right">
<div id="objects" class="objects"></div>
<div class="countText">Count the objects</div>
</div>

<div class="options">
<button class="option odd" onclick="check('odd')">Odd Number</button>
<button class="option even" onclick="check('even')">Even Number</button>
</div>

</div>
<div id="msg" class="msg"></div>
</div>

<div id="end" class="screen">
<div class="card">
<img class="detective" src="assets/detective-happy.png">
<h1>🎉 Case Solved!</h1>
<h2 id="final"></h2>
<button class="start" onclick="restart()">Play Again</button>
</div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
let questions=[
["⭐",3],["🍎",4],["🎈",5],["🌸",6],["🎁",7],
["🍪",8],["⭐",9],["🎈",10],["🍎",2],["🌸",3]
];
let q=[],i=0,score=0,attempts=0;

setTimeout(()=>{logo.style.display="none";intro.style.display="flex"},5000);

function startGame(){
intro.style.display="none";
game.style.display="flex";
q=[...questions].sort(()=>Math.random()-0.5);
i=0;score=0;
load();
}

function load(){
attempts=0;
objects.innerHTML="";
for(let x=0;x<q[i][1];x++){
objects.innerHTML+="<span>"+q[i][0]+"</span>";
}
document.getElementById("score").innerHTML=score;
detective.src="assets/detective-thinking.png";
msg.innerHTML="";
}

function check(ans){
let correctAns=q[i][1]%2==0?"even":"odd";

if(ans==correctAns){
score++;
document.getElementById("score").innerHTML=score;
correct.play();
detective.src="assets/detective-happy.png";
msg.innerHTML="⭐ Great! This is an "+correctAns+" number.";
setTimeout(next,1200);
}else{
attempts++;
wrong.play();
msg.innerHTML="Look carefully again 😊";
if(attempts>=2){
msg.innerHTML="⭐ This is an "+correctAns+" number.";
setTimeout(next,1500);
}
}
}

function next(){
i++;
if(i>=q.length){finish()}else{load()}
}

function finish(){
game.style.display="none";
end.style.display="flex";
final.innerHTML="⭐ Score: "+score+"/10";
clap.play();
}

function restart(){
end.style.display="none";
startGame();
}
</script>
</body>
</html>
