<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Value Game</title>

<style>
body, html { margin:0; padding:0; font-family:'Comic Sans MS', cursive,sans-serif; height:100%; width:100%; }

body { 
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  overflow:hidden;
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
  background-size: 800% 800%;
  animation: gradientAnimate 20s ease infinite;
}

@keyframes gradientAnimate {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.slide { display:none; justify-content:center; align-items:center; flex-direction:column; position:relative; width:100%; height:100%; overflow:hidden; }
.active { display:flex; }

#splash img { width:40vw; max-width:250px; height:auto; margin-top:10vh; }

.instruction-top {
    width:95%;
    text-align:center;
    font-size:4vw;
    color:#2e8b57;
    font-weight:bold;
    padding:10px;
    display:none;
    flex-shrink:0;
}

#game-slides {
    width:100%;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.objects-container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    max-width:95%;
    gap:2vw;
    margin-bottom:2vh;
}

.objects-container img {
    width:12vw;
    max-width:90px;
    height:auto;
}

canvas.draw-canvas {
    border:2px solid #2e8b57;
    background:#fff;
    touch-action: none;
    width:90%;
    max-width:400px;
    height:20vw;
    max-height:120px;
}

button {
    padding:12px 24px;
    border-radius:8px;
    font-size:4vw;
    min-font-size:16px;
    cursor:pointer;
    transition: all 0.3s;
    font-weight:bold;
}

button:hover { opacity:0.9; transform: scale(1.05); }

#nextBtn { background: #4CAF50; color: #fff; }
#clearBtn { background: #FF4500; color: #fff; }

#end { font-size:5vw; color:#2e8b57; text-align:center; display:none; height:100%; width:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; }

canvas#confetti { position:absolute; top:0; left:0; pointer-events:none; width:100%; height:100%; }

/* MOBILE ADJUSTMENTS */
@media(max-width:768px){
  .objects-container img { width:18vw; max-width:60px; }
  canvas.draw-canvas { height:25vw; max-height:100px; }
  button { font-size:5vw; min-font-size:14px; }
  .instruction-top { font-size:5vw; }
}
</style>
</head>

<body>

<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="instruction-top" id="instruction-bar">
Count the objects and write the number in box given below!
</div>

<div id="game-slides"></div>

<div class="slide" id="end">
  <h1>Good Job!</h1>
  <canvas id="confetti"></canvas>
</div>

<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="assets/excellent.mp3"></audio>

<script>
const numbers = [
  {num:23, img:'assets/ball.png'},
  {num:45, img:'assets/dolphin.png'},
  {num:12, img:'assets/airplane.png'},
  {num:36, img:'assets/jet.png'},
  {num:30, img:'assets/lamp.png'}
];

const gameSlidesContainer = document.getElementById('game-slides');

numbers.forEach((item,index)=>{
  const slide = document.createElement('div');
  slide.classList.add('slide');
  slide.innerHTML = `
    <div class="objects-container" id="objects-${index}"></div>
    <canvas class="draw-canvas" id="canvas-${index}"></canvas>
    <div style="margin-top:2vh;">
      <button id="nextBtn-${index}">Next</button>
      <button id="clearBtn-${index}">Clear</button>
    </div>
  `;
  gameSlidesContainer.appendChild(slide);
});

const slides = document.querySelectorAll('.slide');

function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');
}

setTimeout(()=>{
  document.getElementById('instruction-bar').style.display='flex';
  showSlide(1);
  initSlide(0);
},5000);

function initSlide(index){
  const slide = slides[index+1];
  const objectsContainer = slide.querySelector(`#objects-${index}`);
  const canvas = slide.querySelector(`#canvas-${index}`);
  const ctx = canvas.getContext('2d');
  const nextBtn = slide.querySelector(`#nextBtn-${index}`);
  const clearBtn = slide.querySelector(`#clearBtn-${index}`);

  let hasDrawn = false;

  objectsContainer.innerHTML='';
  ctx.clearRect(0,0,canvas.width,canvas.height);
  nextBtn.style.display='inline-block';

  for(let i=0;i<numbers[index].num;i++){
    const obj = document.createElement('img');
    obj.src = numbers[index].img;
    objectsContainer.appendChild(obj);
  }

  let drawing=false;

  canvas.addEventListener('pointerdown',()=>{ drawing=true; hasDrawn=true; ctx.beginPath(); });
  canvas.addEventListener('pointerup',()=>{ drawing=false; });
  canvas.addEventListener('pointerleave',()=>{ drawing=false; });
  canvas.addEventListener('pointermove',(e)=>{
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.strokeStyle='#2e8b57';
    ctx.lineTo(e.clientX-rect.left, e.clientY-rect.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX-rect.left, e.clientY-rect.top);
  });

  clearBtn.addEventListener('click',()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn=false; });

  nextBtn.addEventListener('click',()=>{
    if(!hasDrawn){
      document.getElementById("audio-wrong").play();
      alert("Try Again");
      return;
    }
    if(index+1 < numbers.length){
      showSlide(index+2);
      initSlide(index+1);
    } else showEndSlide();
  });
}

function showEndSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  document.getElementById('end').classList.add('active');
  document.getElementById('audio-excellent').play();
  document.getElementById('instruction-bar').style.display='none';
  launchConfetti();
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*20+10,
      color:['#ff6666','#ffcc66','#66ff66','#66ccff','#cc66ff'][Math.floor(Math.random()*5)],
      tilt:Math.random()*10-10,
      tiltAngleIncrement:Math.random()*0.07+0.05
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();

      c.tilt+=c.tiltAngleIncrement;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;

      if(c.y>canvas.height){
        c.y=-10;
        c.x=Math.random()*canvas.width;
      }
    });
    requestAnimationFrame(draw);
  }

  draw();
}

// Adjust canvas on resize and orientation change
window.addEventListener("resize",()=>{ 
  const canvas=document.getElementById("confetti"); 
  canvas.width=window.innerWidth; 
  canvas.height=window.innerHeight; 
});
window.addEventListener("orientationchange",()=>{ 
  setTimeout(()=>{
    const canvas=document.getElementById("confetti"); 
    canvas.width=window.innerWidth; 
    canvas.height=window.innerHeight; 
  },250); 
});

</script>
</body>
</html>
