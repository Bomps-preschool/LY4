<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Value Game</title>
<style>
body, html { margin:0; padding:0; font-family:'Comic Sans MS', cursive,sans-serif; }

/* Melodic animated background */
body { 
  background: linear-gradient(135deg, #ffcccc, #ffb3ff, #ccffff); 
  background-size: 400% 400%; 
  animation: bgAnimate 15s ease infinite; 
}
@keyframes bgAnimate { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

.slide { width:100vw; height:100vh; display:none; justify-content:center; align-items:center; flex-direction:column; position:relative; }
.active { display:flex; }
#splash img { width:250px; height:auto; }

.instruction-top {
  width:100%;
  text-align:center;
  font-size:1em;
  color:#2e8b57;
  font-weight:bold;
  padding:10px;
  display:none;
}

.picture img { width:150px; height:auto; margin-bottom:20px; animation: floatImg 4s ease-in-out infinite; transition: transform 0.5s ease-in-out; }
@keyframes floatImg { 0%,100%{transform:translateY(-10px);} 50%{transform:translateY(-5px);} }

input[type=number] { font-size:24px; width:100px; text-align:center; padding:5px; margin-bottom:15px; border-radius:5px; border:2px solid #2e8b57; box-shadow:0 0 5px #66ccff; transition:all 0.3s; }
input[type=number]:focus { box-shadow:0 0 10px #66ccff; }

button#nextBtn { padding:10px 20px; font-size:18px; cursor:pointer; border:none; border-radius:5px; background:#66ccff; color:#fff; display:none; margin-top:10px; transition:all 0.3s; }
button#nextBtn:hover { background:#2e8b57; }

#end { font-size:2em; color:#2e8b57; text-align:center; }
canvas { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>

<!-- Splash -->
<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Instruction -->
<div class="instruction-top" id="instruction-bar">
Count the objects and type the correct number in the box below!
</div>

<!-- Game Slides -->
<div id="game-slides"></div>

<!-- End Slide -->
<div class="slide" id="end">
  <h1>Good Job!</h1>
  <canvas id="confetti"></canvas>
</div>

<!-- Audio -->
<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="assets/excellent.mp3"></audio>

<script>
// Number data with objects
const numbers = [
  {num:23, img:'assets/ball.png'},
  {num:45, img:'assets/dolphin.png'},
  {num:12, img:'assets/jet.png'},
  {num:36, img:'assets/jet.png'},
  {num:30, img:'assets/lamp.png'}
];

// Generate slides
const gameSlidesContainer = document.getElementById('game-slides');
numbers.forEach((item,index)=>{
  const slide = document.createElement('div');
  slide.classList.add('slide');
  slide.dataset.num = item.num;
  slide.innerHTML = `
    <div class="picture"><img src="${item.img}" alt="objects"></div>
    <input type="number" id="input-${index}" placeholder="Enter number">
    <button id="nextBtn-${index}">Next</button>
  `;
  gameSlidesContainer.appendChild(slide);
});

const slides = document.querySelectorAll('.slide');
let currentSlide=0;

// Show slide
function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');
}

// Splash 5s → first game slide
setTimeout(()=>{
  document.getElementById('instruction-bar').style.display='block';
  showSlide(1);
  initSlide(0);
},5000);

// Initialize slide
function initSlide(index){
  const slide = slides[index+1];
  const inputBox = slide.querySelector(`#input-${index}`);
  const nextBtn = slide.querySelector(`#nextBtn-${index}`);

  nextBtn.style.display='none';
  inputBox.value='';
  inputBox.style.borderColor='#2e8b57';

  inputBox.addEventListener('input',()=>{
    if(inputBox.value !== '') nextBtn.style.display='inline-block';
    else nextBtn.style.display='none';
  });

  nextBtn.addEventListener('click',()=>{
    if(Number(inputBox.value) === numbers[index].num){
      document.getElementById('audio-correct').play();
      inputBox.style.borderColor='green';
      setTimeout(()=>{
        if(index+1 < numbers.length){
          showSlide(index+2);
          initSlide(index+1);
        } else showEndSlide();
      },500);
    } else {
      document.getElementById('audio-wrong').play();
      inputBox.style.borderColor='red';
      inputBox.value='';
      nextBtn.style.display='none';
    }
  });
}

// End Slide + Confetti
function showEndSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  document.getElementById('end').classList.add('active');
  document.getElementById('audio-excellent').play();
  document.getElementById('instruction-bar').style.display='none';
  launchConfetti();
}

// Confetti animation
function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*20+10, color:['#ff6666','#ffcc66','#66ff66','#66ccff','#cc66ff'][Math.floor(Math.random()*5)], tilt:Math.random()*10-10, tiltAngleIncrement:Math.random()*0.07+0.05});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();
      c.tilt+=c.tiltAngleIncrement;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;
      if(c.y>canvas.height){c.y=-10;c.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
