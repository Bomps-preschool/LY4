<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Value Game</title>
<style>
body, html { margin:0; padding:0; font-family:'Comic Sans MS', cursive,sans-serif; }
body { background: linear-gradient(135deg, #ffcccc, #ffb3ff, #ccffff); background-size:400% 400%; animation:bgAnimate 15s ease infinite; }
@keyframes bgAnimate { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

.slide { width:100vw; height:100vh; display:none; justify-content:center; align-items:center; flex-direction:column; position:relative; }
.active { display:flex; }
#splash img { width:250px; height:auto; }

.instruction-top { width:100%; text-align:center; font-size:1em; color:#2e8b57; font-weight:bold; padding:10px; display:none; }

.objects-container { display:flex; flex-wrap:wrap; justify-content:center; max-width:90vw; margin-bottom:20px; }
.objects-container img { width:50px; height:50px; margin:2px; }

canvas.draw-canvas { border:2px solid #2e8b57; background:#fff; touch-action: none; }

button { padding:10px 20px; font-size:18px; cursor:pointer; border:none; border-radius:5px; margin:5px; color:#fff; transition: all 0.3s; }
button:hover { opacity:0.8; }
#nextBtn { background:#66ccff; }
#clearBtn { background:#ff6666; }

#end { font-size:2em; color:#2e8b57; text-align:center; }
canvas#confetti { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>

<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="instruction-top" id="instruction-bar">
Draw the number corresponding to the objects below!
</div>

<div id="game-slides"></div>

<div class="slide" id="end">
  <h1>Good Job!</h1>
  <canvas id="confetti"></canvas>
</div>

<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="assets/excellent.mp3"></audio>

<script>
const numbers = [
  {num:23, img:'assets/ball.png'},
  {num:45, img:'assets/dolphin.png'},
  {num:12, img:'assets/jet.png'},
  {num:36, img:'assets/jet.png'},
  {num:30, img:'assets/lamp.png'}
];

const gameSlidesContainer = document.getElementById('game-slides');
numbers.forEach((item,index)=>{
  const slide = document.createElement('div');
  slide.classList.add('slide');
  slide.dataset.num = item.num;
  slide.innerHTML = `
    <div class="objects-container" id="objects-${index}"></div>
    <canvas class="draw-canvas" id="canvas-${index}" width="300" height="100"></canvas>
    <div>
      <button id="nextBtn-${index}">Next</button>
      <button id="clearBtn-${index}">Clear</button>
    </div>
  `;
  gameSlidesContainer.appendChild(slide);
});

const slides = document.querySelectorAll('.slide');

function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');
}

setTimeout(()=>{
  document.getElementById('instruction-bar').style.display='block';
  showSlide(1);
  initSlide(0);
},5000);

function initSlide(index){
  const slide = slides[index+1];
  const objectsContainer = slide.querySelector(`#objects-${index}`);
  const canvas = slide.querySelector(`#canvas-${index}`);
  const ctx = canvas.getContext('2d');
  const nextBtn = slide.querySelector(`#nextBtn-${index}`);
  const clearBtn = slide.querySelector(`#clearBtn-${index}`);

  objectsContainer.innerHTML='';
  ctx.clearRect(0,0,canvas.width,canvas.height);
  nextBtn.style.display='none';

  for(let i=0;i<numbers[index].num;i++){
    const obj = document.createElement('img');
    obj.src = numbers[index].img;
    obj.alt='object';
    objectsContainer.appendChild(obj);
  }

  // Drawing
  let drawing=false;
  canvas.addEventListener('pointerdown',()=>{ drawing=true; ctx.beginPath(); });
  canvas.addEventListener('pointerup',()=>{ drawing=false; nextBtn.style.display='inline-block'; });
  canvas.addEventListener('pointerleave',()=>{ drawing=false; });
  canvas.addEventListener('pointermove',(e)=>{
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.strokeStyle='#2e8b57';
    ctx.lineTo(e.clientX-rect.left, e.clientY-rect.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX-rect.left, e.clientY-rect.top);
  });

  // Clear button
  clearBtn.addEventListener('click',()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    nextBtn.style.display='none';
  });

  nextBtn.addEventListener('click',()=>{
    if(index+1 < numbers.length){
      showSlide(index+2);
      initSlide(index+1);
    } else showEndSlide();
  });
}

function showEndSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  document.getElementById('end').classList.add('active');
  document.getElementById('audio-excellent').play();
  document.getElementById('instruction-bar').style.display='none';
  launchConfetti();
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*20+10, color:['#ff6666','#ffcc66','#66ff66','#66ccff','#cc66ff'][Math.floor(Math.random()*5)], tilt:Math.random()*10-10, tiltAngleIncrement:Math.random()*0.07+0.05});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();
      c.tilt+=c.tiltAngleIncrement;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;
      if(c.y>canvas.height){c.y=-10;c.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
