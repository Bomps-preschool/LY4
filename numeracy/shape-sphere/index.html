<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sphere Detective</title>

<style>
*{box-sizing:border-box}

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
}

.screen{
display:none;
position:fixed;
inset:0;
}

#logo{
display:flex;
align-items:center;
justify-content:center;
background:white;
z-index:10;
}

#logo img{
width:260px;
max-width:70%;
}

#intro,#game,#end{
background:linear-gradient(135deg,#dff7ff,#fff1f8,#fff8d8);
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.box{
background:white;
border:4px solid #e6a3c2;
border-radius:30px;
padding:25px;
width:90%;
max-width:900px;
margin:auto;
}

h1{
font-size:44px;
color:#d84f91;
}

p{
font-size:22px;
color:#51438b;
}

button{
border:none;
border-radius:25px;
padding:15px 35px;
font-size:25px;
background:#7bbf8c;
color:white;
cursor:pointer;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
border:3px solid #e6a3c2;
border-radius:20px;
padding:10px 20px;
font-size:25px;
color:#51438b;
}

.area{
height:calc(100vh - 120px);
display:flex;
gap:25px;
align-items:center;
justify-content:center;
}

.card{
background:white;
border:4px solid #e6a3c2;
border-radius:30px;
width:45%;
height:80%;
max-height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.card img{
width:70%;
height:60%;
max-width:75%;
max-height:55vh;
object-fit:contain;
}

.question{
font-size:32px;
color:#51438b;
}

.option{
display:block;
width:230px;
margin:15px;
background:#ffe89c;
color:#51438b;
border:3px solid #dcae35;
}

.msg{
font-size:28px;
color:#d84f91;
font-weight:bold;
}

#end{
display:none;
}

#end .box{
margin:auto;
}

@media(max-width:800px){

.area{
flex-direction:column;
height:calc(100vh - 150px);
}

.card{
width:95%;
height:42vh;
}

.card img{
height:auto;
width:auto;
max-height:22vh;
}

h1{
font-size:32px;
}

p{
font-size:18px;
}

.option{
width:180px;
font-size:22px;
}

}

@media(max-width:500px){

.card img{
max-height:18vh;
}

.question{
font-size:24px;
}

}
</style>
</head>

<body>

<div id="logo" class="screen" style="display:flex">
<img src="assets/innovine-logo.png">
</div>

<div id="intro" class="screen" style="display:flex">
<div class="box">
<h1>⚪ Sphere Detective</h1>
<p>Find the objects that are shaped like a sphere!</p>
<p>👀 Look carefully at the object.</p>
<p>⚪ Tap Sphere if it is round like a ball.</p>
<p>🔷 Tap Not a Sphere if it has another shape.</p>
<button onclick="start()">Start Game</button>
</div>
</div>

<div id="game" class="screen">
<div class="header">
<b>⚪ Sphere Detective</b>
<b>⭐ <span id="score">0</span>/10</b>
</div>

<p>Question <span id="q">1</span> of 10</p>

<div class="area">

<div class="card">
<img id="pic">
<div class="question">Is this a sphere?</div>
</div>

<div class="card">
<button class="option" onclick="check('sphere')">⚪ Sphere</button>
<button class="option" onclick="check('not')">🔷 Not a Sphere</button>
<div id="msg" class="msg"></div>
</div>

</div>
</div>

<div id="end" class="screen" style="display:none">
<div class="box">
<h1>🎉 Well Done!</h1>
<h2 style="color:#51438b">🏆 Sphere Explorer</h2>
<h2 id="final" style="color:#d84f91"></h2>
<button onclick="restart()">Play Again</button>
</div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>

<script>
const data=[
["football.png","sphere"],
["orange.png","sphere"],
["marble.png","sphere"],
["balloon.png","sphere"],
["dice.png","not"],
["cone.png","not"],
["milk-cartoon.png","not"],
["book.png","not"],
["can.png","not"],
["football.png","sphere"]
];

let qs=[],i=0,score=0,tries=0;

setTimeout(()=>{
logo.style.display="none";
intro.style.display="flex";
},5000);

function start(){
intro.style.display="none";
game.style.display="block";
qs=[...data].sort(()=>Math.random()-0.5);
i=0;
score=0;
load();
}

function load(){
tries=0;
pic.src="assets/"+qs[i][0];
q.innerHTML=i+1;
document.getElementById("score").innerHTML=score;
msg.innerHTML="";
}

function check(ans){

if(ans==qs[i][1]){
score++;
document.getElementById("score").innerHTML=score;
correct.play();
msg.innerHTML="⭐ Great Job!";
setTimeout(next,1000);

}else{

tries++;
wrong.play();
msg.innerHTML="Oops! Try Again 😊";

if(tries>=2){
setTimeout(next,1200);
}

}

}

function next(){
i++;
if(i>=qs.length){
finish();
}else{
load();
}
}

function finish(){
game.style.display="none";
end.style.display="flex";
final.innerHTML="⭐ Your Score: "+score+"/10";
clap.play();
}

function restart(){
end.style.display="none";
start();
}

</script>

</body>
</html>
