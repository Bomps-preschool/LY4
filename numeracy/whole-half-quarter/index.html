<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Magic Shape Painter</title>

<style>
*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:"Comic Sans MS",sans-serif;
}

button{
    font-family:inherit;
    cursor:pointer;
    touch-action:manipulation;
}

.screen{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* Logo Screen */

#logo{
    display:flex;
    background:white;
}

#logo img{
    width:260px;
    max-width:75%;
}

/* General Screens */

#intro,
#game,
#end{
    background:
        linear-gradient(
            #fff2d8,
            #dff6ff,
            #f7e8ff
        );

    padding:20px;
}

.card{
    background:white;
    border:4px solid #e6a3c2;
    border-radius:30px;
    padding:30px;
    width:90%;
    max-width:900px;
}

.card p{
    font-size:22px;
    line-height:1.5;
}

/* Buttons */

.start,
.action{
    background:#7bbf8c;
    color:white;
    border:none;
    border-radius:25px;
    padding:12px 30px;
    font-size:24px;
    margin:8px;
}

.start:active,
.action:active,
.speaker-button:active{
    transform:scale(0.95);
}

/* Header */

.header{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;

    background:white;
    padding:12px 18px;
    border-radius:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    color:#51438b;
    font-size:20px;
}

.header-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.speaker-button{
    width:45px;
    height:45px;

    padding:0;
    margin:0;

    border:none;
    border-radius:50%;

    background:#5dade2;
    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

/* Main Game */

.main{
    background:white;
    border:4px solid #e6a3c2;
    border-radius:30px;

    padding:40px;

    display:flex;
    gap:30px;
    align-items:center;
    justify-content:center;

    width:90%;
    max-width:950px;

    margin-top:60px;
}

#question{
    color:#51438b;
    min-height:60px;
    margin-top:0;
}

#shapeCanvas{
    border:4px dashed #d84f91;
    border-radius:40px;
    background:white;
    touch-action:none;
    max-width:100%;
}

/* Colour Buttons */

.colors{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    max-width:260px;
}

.colors button{
    width:65px;
    height:65px;

    border-radius:50%;
    margin:8px;

    border:4px solid white;

    box-shadow:
        0 3px 8px
        rgba(0,0,0,0.18);
}

.colors button.selected-colour{
    border:5px solid #51438b;
    transform:scale(1.12);
}

.red{
    background:red;
}

.yellow{
    background:#ffd166;
}

.green{
    background:#70d6a5;
}

.blue{
    background:#5dade2;
}

.purple{
    background:#b084f5;
}

/* Message */

.msg{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);

    min-width:260px;

    font-size:24px;
    color:#d84f91;

    background:white;
    padding:10px 20px;
    border-radius:20px;
}

/* Responsive */

@media(max-width:800px){

    #intro,
    #game,
    #end{
        padding:10px;
    }

    .header{
        font-size:16px;
        padding:9px 12px;
    }

    .header-left{
        gap:6px;
    }

    .speaker-button{
        width:40px;
        height:40px;
        font-size:21px;
    }

    .main{
        flex-direction:column;
        gap:8px;

        padding:16px;

        margin-top:55px;

        max-height:
            calc(100vh - 115px);
    }

    #question{
        font-size:20px;
        min-height:auto;
        margin:2px 0 8px;
    }

    #shapeCanvas{
        width:245px;
        height:245px;
    }

    .colors{
        max-width:100%;
    }

    .colors button{
        width:48px;
        height:48px;
        margin:5px;
    }

    .action{
        font-size:18px;
        padding:9px 20px;
        margin:4px;
    }

    .msg{
        bottom:6px;
        font-size:17px;
        padding:7px 15px;
    }
}

@media(max-height:650px){

    .main{
        transform:scale(0.88);
        margin-top:38px;
    }

    .msg{
        bottom:4px;
    }
}
</style>
</head>

<body>

<!-- Logo Screen -->

<div
    id="logo"
    class="screen">

    <img
        src="assets/innovine-logo.png"
        alt="Innovine Logo">

</div>

<!-- Introduction Screen -->

<div
    id="intro"
    class="screen">

    <div class="card">

        <h1>
            🎨 Magic Shape Painter
        </h1>

        <p>
            Choose a colour and paint the whole,
            half or quarter.
        </p>

        <button
            class="start"
            onclick="startGame()">

            Start Painting

        </button>

    </div>

</div>

<!-- Game Screen -->

<div
    id="game"
    class="screen">

    <div class="header">

        <div class="header-left">

            <b>
                🎨 Magic Shape Painter
            </b>

            <button
                class="speaker-button"
                onclick="speakCurrentInstruction()"
                aria-label="Repeat the instruction"
                title="Repeat the instruction">

                🔊

            </button>

        </div>

        <b>
            ⭐
            <span id="score">0</span>/10
        </b>

    </div>

    <div class="main">

        <div>

            <h2 id="question"></h2>

            <canvas
                id="shapeCanvas"
                width="350"
                height="350">
            </canvas>

        </div>

        <div>

            <p>
                Choose Colour
            </p>

            <div class="colors">

                <button
                    class="red selected-colour"
                    onclick="chooseColour('red',this)"
                    aria-label="Red">
                </button>

                <button
                    class="yellow"
                    onclick="chooseColour('#ffd166',this)"
                    aria-label="Yellow">
                </button>

                <button
                    class="green"
                    onclick="chooseColour('#70d6a5',this)"
                    aria-label="Green">
                </button>

                <button
                    class="blue"
                    onclick="chooseColour('#5dade2',this)"
                    aria-label="Blue">
                </button>

                <button
                    class="purple"
                    onclick="chooseColour('#b084f5',this)"
                    aria-label="Purple">
                </button>

            </div>

            <button
                class="action"
                onclick="clearPaint()">

                Clear

            </button>

            <button
                class="action"
                onclick="submitAnswer()">

                Submit

            </button>

        </div>

    </div>

    <div
        id="msg"
        class="msg">
    </div>

</div>

<!-- End Screen -->

<div
    id="end"
    class="screen">

    <div class="card">

        <h1>
            🎉 Amazing Painter!
        </h1>

        <h2 id="final"></h2>

        <button
            class="start"
            onclick="restartGame()">

            Play Again

        </button>

    </div>

</div>

<!-- Sound Effects -->

<audio
    id="correct"
    src="assets/correct.mp3"
    preload="auto">
</audio>

<audio
    id="wrong"
    src="assets/wrong.mp3"
    preload="auto">
</audio>

<audio
    id="clap"
    src="assets/claps.mp3"
    preload="auto">
</audio>

<script>

/* Questions */

const originalQuestions = [

    ["pizza.png","whole","pizza"],

    ["circle.png","whole","circle"],

    ["balloon.png","whole","balloon"],

    ["cake.png","half","cake"],

    ["watermelon.png","half","watermelon"],

    ["square.png","half","square"],

    ["chocolate.png","quarter","chocolate"],

    ["hexagon.png","quarter","hexagon"],

    ["kiwi.png","quarter","kiwi"],

    ["pizza.png","quarter","pizza"]

];

let questions = [];

let index = 0;
let score = 0;

let selected = "red";

let painted = false;
let drawing = false;

let currentInstruction = "";

let speechEnabled = false;

/* Elements */

const logoScreen =
    document.getElementById("logo");

const introScreen =
    document.getElementById("intro");

const gameScreen =
    document.getElementById("game");

const endScreen =
    document.getElementById("end");

const questionText =
    document.getElementById("question");

const scoreText =
    document.getElementById("score");

const messageBox =
    document.getElementById("msg");

const finalText =
    document.getElementById("final");

const correctAudio =
    document.getElementById("correct");

const wrongAudio =
    document.getElementById("wrong");

const clapAudio =
    document.getElementById("clap");

const canvas =
    document.getElementById("shapeCanvas");

const ctx =
    canvas.getContext("2d");

const img =
    new Image();

/* Logo Timer */

setTimeout(function(){

    logoScreen.style.display = "none";
    introScreen.style.display = "flex";

},5000);

/* Shuffle Questions */

function shuffleQuestions(){

    questions =
        originalQuestions.map(
            function(question){

                return [...question];

            }
        );

    for(
        let i = questions.length - 1;
        i > 0;
        i--
    ){

        const randomIndex =
            Math.floor(
                Math.random() * (i + 1)
            );

        [
            questions[i],
            questions[randomIndex]
        ] = [
            questions[randomIndex],
            questions[i]
        ];

    }

}

/* Start Game */

function startGame(){

    speechEnabled = true;

    shuffleQuestions();

    index = 0;
    score = 0;

    introScreen.style.display = "none";
    endScreen.style.display = "none";
    gameScreen.style.display = "flex";

    loadQuestion();

}

/* Load Current Question */

function loadQuestion(){

    painted = false;
    drawing = false;

    messageBox.textContent = "";

    const part =
        questions[index][1];

    const objectName =
        questions[index][2];

    currentInstruction =
        "Colour the " +
        part +
        " of the " +
        objectName +
        ".";

    questionText.textContent =
        currentInstruction;

    scoreText.textContent =
        score;

    drawImage();

    /*
    Automatically read every new instruction.
    A small delay allows the new question to
    appear before the voice begins.
    */

    if(speechEnabled){

        setTimeout(function(){

            speakCurrentInstruction();

        },400);

    }

}

/* Speak Current Instruction */

function speakCurrentInstruction(){

    if(!currentInstruction){
        return;
    }

    if(
        !("speechSynthesis" in window)
    ){

        messageBox.textContent =
            "Audio instructions are not supported on this device.";

        return;
    }

    /*
    Stop any instruction that is already playing.
    */

    window.speechSynthesis.cancel();

    const speech =
        new SpeechSynthesisUtterance(
            currentInstruction
        );

    /*
    en-IN gives an Indian English voice when
    available. The browser will use another
    English voice when en-IN is unavailable.
    */

    speech.lang = "en-IN";
    speech.rate = 0.82;
    speech.pitch = 1.05;
    speech.volume = 1;

    const voices =
        window.speechSynthesis.getVoices();

    const preferredVoice =
        voices.find(
            function(voice){

                return voice.lang === "en-IN";

            }
        ) ||

        voices.find(
            function(voice){

                return voice.lang.startsWith("en");

            }
        );

    if(preferredVoice){

        speech.voice =
            preferredVoice;

    }

    window.speechSynthesis.speak(
        speech
    );

}

/*
Some browsers load available voices after
the page has already opened.
*/

if(
    "speechSynthesis" in window
){

    window.speechSynthesis.onvoiceschanged =
        function(){

            window.speechSynthesis.getVoices();

        };

}

/* Draw Image */

function drawImage(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    img.onload = function(){

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.drawImage(
            img,
            50,
            50,
            250,
            250
        );

    };

    img.onerror = function(){

        messageBox.textContent =
            "The picture could not be loaded.";

    };

    img.src =
        "assets/" +
        questions[index][0];

}

/* Choose Colour */

function chooseColour(
    colour,
    button
){

    selected =
        colour;

    document
        .querySelectorAll(
            ".colors button"
        )
        .forEach(
            function(item){

                item.classList.remove(
                    "selected-colour"
                );

            }
        );

    button.classList.add(
        "selected-colour"
    );

}

/* Paint */

function paint(event){

    if(!drawing){
        return;
    }

    const rectangle =
        canvas.getBoundingClientRect();

    const x =
        (
            event.clientX -
            rectangle.left
        ) *
        (
            canvas.width /
            rectangle.width
        );

    const y =
        (
            event.clientY -
            rectangle.top
        ) *
        (
            canvas.height /
            rectangle.height
        );

    ctx.fillStyle =
        selected;

    ctx.beginPath();

    ctx.arc(
        x,
        y,
        18,
        0,
        Math.PI * 2
    );

    ctx.fill();

    painted = true;

}

/* Pointer Controls */

canvas.addEventListener(
    "pointerdown",
    function(event){

        drawing = true;

        try{

            canvas.setPointerCapture(
                event.pointerId
            );

        }catch(error){

            console.log(
                "Pointer capture unavailable."
            );

        }

        paint(event);

    }
);

canvas.addEventListener(
    "pointermove",
    paint
);

canvas.addEventListener(
    "pointerup",
    function(){

        drawing = false;

    }
);

canvas.addEventListener(
    "pointercancel",
    function(){

        drawing = false;

    }
);

canvas.addEventListener(
    "pointerleave",
    function(){

        drawing = false;

    }
);

/* Clear */

function clearPaint(){

    drawImage();

    painted = false;
    drawing = false;

    messageBox.textContent = "";

}

/* Play Sound Effect */

function playSound(audio){

    audio.pause();
    audio.currentTime = 0;

    const soundPromise =
        audio.play();

    if(soundPromise !== undefined){

        soundPromise.catch(
            function(error){

                console.log(
                    "Sound could not play:",
                    error
                );

            }
        );

    }

}

/* Submit */

function submitAnswer(){

    window.speechSynthesis.cancel();

    if(!painted){

        messageBox.textContent =
            "🎨 Please colour the shape first!";

        return;

    }

    const pixels =
        ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
        ).data;

    let count = 0;

    for(
        let i = 0;
        i < pixels.length;
        i += 4
    ){

        const red =
            pixels[i];

        const green =
            pixels[i + 1];

        const blue =
            pixels[i + 2];

        const alpha =
            pixels[i + 3];

        const visible =
            alpha > 0;

        const almostWhite =
            red > 240 &&
            green > 240 &&
            blue > 240;

        if(
            visible &&
            !almostWhite
        ){

            count++;

        }

    }

    if(count < 3000){

        messageBox.textContent =
            "😊 Try colouring the correct part!";

        playSound(
            wrongAudio
        );

        return;

    }

    score++;

    scoreText.textContent =
        score;

    playSound(
        correctAudio
    );

    messageBox.textContent =
        "⭐ Great Painting!";

    setTimeout(
        function(){

            index++;

            if(
                index >=
                questions.length
            ){

                finishGame();

            }else{

                /*
                loadQuestion automatically reads
                the next instruction.
                */

                loadQuestion();

            }

        },
        1100
    );

}

/* End Game */

function finishGame(){

    window.speechSynthesis.cancel();

    gameScreen.style.display =
        "none";

    endScreen.style.display =
        "flex";

    finalText.textContent =
        "⭐ Score: " +
        score +
        "/10";

    playSound(
        clapAudio
    );

}

/* Play Again */

function restartGame(){

    window.speechSynthesis.cancel();

    startGame();

}

/* Stop Voice When Page Is Hidden */

document.addEventListener(
    "visibilitychange",
    function(){

        if(document.hidden){

            window.speechSynthesis.cancel();

        }

    }
);

</script>

</body>
</html>
