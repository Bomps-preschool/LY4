<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patterning Game</title>

<style>

html, body {
  margin:0;
  padding:0;
  font-family:'Comic Sans MS', cursive, sans-serif;
  height:100%;
  overflow:hidden;
}

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #fce4ec, #e1bee7, #bbdefb);
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* SLIDES */
.slide {
  width:100vw;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
  overflow:hidden;
  box-sizing:border-box;
}

.active { display:flex; }

#splash img { width:220px; height:auto; }

/* INSTRUCTION */
.instruction-top {
  width:100%;
  text-align:center;
  font-size:clamp(14px, 2vw, 18px);
  color:#2e7d32;
  font-weight:bold;
  padding:8px;
  display:none;
}

/* PATTERN + OPTIONS */
.pattern-row {
  display:flex;
  justify-content:center;
  margin-bottom:12px;
  flex-wrap:wrap;
  max-width:95vw;
}

.pattern-row img,
.option-row img {
  width: clamp(55px, 8vw, 90px);
  height: clamp(55px, 8vw, 90px);
  margin:2px;
  animation: floatAnim 3s ease-in-out infinite;
}

.option-row {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:10px;
  max-width:95vw;
}

.option-row img {
  cursor:pointer;
  transition: all 0.3s;
}

.option-row img:hover {
  transform: scale(1.1);
  box-shadow:0px 0px 8px #666;
}

/* EMPTY SLOT */
.empty-slot {
  width: clamp(55px, 8vw, 90px);
  height: clamp(55px, 8vw, 90px);
  border:2px dashed #2e7d32;
  margin:2px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FLOAT ANIMATION */
@keyframes floatAnim {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

/* BUTTONS */
button {
  padding:8px 16px;
  font-size:clamp(14px,2vw,16px);
  border-radius:8px;
  cursor:pointer;
  margin:10px;
  transition: all 0.3s;
}

button:hover {
  opacity:0.9;
  transform: scale(1.05);
}

#nextBtn { background:#4caf50; color:white; }
#clearBtn { background:#ff5722; color:white; }

/* END */
#end {
  font-size:2em;
  color:#2e7d32;
  text-align:center;
}

canvas#confetti {
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div class="slide active" id="splash">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- INSTRUCTION -->
<div class="instruction-top" id="instruction-bar">
Tap the correct picture to complete the pattern!
</div>

<!-- GAME -->
<div id="game-slides"></div>

<!-- END -->
<div class="slide" id="end">
  <h1>Well Done!</h1>
  <canvas id="confetti"></canvas>
</div>

<!-- AUDIO -->
<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-excellent" src="assets/claps.mp3"></audio>

<script>

const patterns = [
  {type:"ABAB", row:["car","umbrella","car","umbrella","car"], empty:2, expected:["umbrella","car"], options:["car","umbrella","grapes"]},
  {type:"AABBAABB", row:["grapes","grapes","juice","juice","grapes"], empty:2, expected:["grapes","juice"], options:["balloon","juice","grapes"]},
  {type:"AB", row:["balloon","car","balloon","car"], empty:2, expected:["balloon","car"], options:["balloon","car","umbrella"]},
  {type:"AABB", row:["flower","flower","umbrella","umbrella"], empty:2, expected:["flower","flower"], options:["flower","umbrella","juice"]}
];

const container = document.getElementById('game-slides');

patterns.forEach((p,index)=>{
  const slide = document.createElement('div');
  slide.classList.add('slide');
  slide.dataset.index = index;
  slide.innerHTML = `
    <div class="pattern-row" id="pattern-${index}"></div>
    <div class="option-row" id="options-${index}"></div>
    <div>
      <button id="nextBtn-${index}">Next</button>
      <button id="clearBtn-${index}">Clear</button>
    </div>
  `;
  container.appendChild(slide);
});

const slides = document.querySelectorAll('.slide');

function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');
}

setTimeout(()=>{
  document.getElementById('instruction-bar').style.display='block';
  showSlide(1);
  initSlide(0);
},5000);

function initSlide(index){

  const slide = slides[index+1];
  const p = patterns[index];
  const patternRow = slide.querySelector(`#pattern-${index}`);
  const optionRow = slide.querySelector(`#options-${index}`);
  const nextBtn = slide.querySelector(`#nextBtn-${index}`);
  const clearBtn = slide.querySelector(`#clearBtn-${index}`);

  patternRow.innerHTML="";
  optionRow.innerHTML="";
  nextBtn.style.display='none';

  p.row.forEach(item=>{
    const img = document.createElement('img');
    img.src=`assets/${item}.png`;
    patternRow.appendChild(img);
  });

  for(let i=0;i<p.empty;i++){
    const emptyDiv = document.createElement('div');
    emptyDiv.classList.add('empty-slot');
    emptyDiv.dataset.filled="false";
    emptyDiv.dataset.index=i;
    patternRow.appendChild(emptyDiv);
  }

  p.options.forEach(opt=>{
    const optImg = document.createElement('img');
    optImg.src=`assets/${opt}.png`;

    optImg.addEventListener('click', ()=>{

      const emptyDivs = patternRow.querySelectorAll('.empty-slot');
      let placed=false;

      emptyDivs.forEach(slot=>{
        if(slot.dataset.filled==="false" && !placed){
          const expectedIndex = parseInt(slot.dataset.index);

          if(opt === p.expected[expectedIndex]){
            slot.innerHTML = `<img src="assets/${opt}.png">`;
            slot.dataset.filled="true";
            placed=true;
            document.getElementById('audio-correct').play();
          } else {
            document.getElementById('audio-wrong').play();
          }
        }
      });

      const remaining = patternRow.querySelectorAll('.empty-slot[data-filled="false"]');
      if(remaining.length===0) nextBtn.style.display='inline-block';
    });

    optionRow.appendChild(optImg);
  });

  clearBtn.addEventListener('click',()=>{
    const emptyDivs = patternRow.querySelectorAll('.empty-slot');
    emptyDivs.forEach(e=>{
      e.innerHTML="";
      e.dataset.filled="false";
    });
    nextBtn.style.display='none';
  });

  nextBtn.addEventListener('click', ()=>{
    if(index+1 < patterns.length){
      showSlide(index+2);
      initSlide(index+1);
    } else showEndSlide();
  });
}

function showEndSlide(){
  slides.forEach(s=>s.classList.remove('active'));
  document.getElementById('end').classList.add('active');
  document.getElementById('audio-excellent').play();
  document.getElementById('instruction-bar').style.display='none';
  launchConfetti();
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const confetti=[];
  for(let i=0;i<150;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*20+10,
      color:['#ff6666','#ffcc66','#66ff66','#66ccff','#cc66ff'][Math.floor(Math.random()*5)],
      tilt:Math.random()*10-10,
      tiltAngleIncrement:Math.random()*0.07+0.05
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth=c.r;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt+c.r/2,c.y);
      ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2);
      ctx.stroke();

      c.tilt+=c.tiltAngleIncrement;
      c.y+=(Math.cos(c.d)+3+c.r/2)/2;

      if(c.y>canvas.height){
        c.y=-10;
        c.x=Math.random()*canvas.width;
      }
    });
    requestAnimationFrame(draw);
  }

  draw();
}

</script>

</body>
</html>
