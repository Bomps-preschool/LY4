<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportation Game</title>
<style>
  * {box-sizing: border-box; margin:0; padding:0;}
  body, html {height: 100%; width: 100%; font-family: 'Comic Sans MS', cursive, sans-serif;}
  #logoScreen, #gameScreen, #congratsScreen {display: none; height:100%; width:100%; position: relative;}
  #logoScreen {display: flex; justify-content: center; align-items: center; background: #fff;}
  #logoScreen img {max-width: 300px; max-height: 300px;}

  #gameScreen {
    background: url('assets/background-zones.png') no-repeat center top;
    background-size: cover; display: flex; justify-content: flex-start; align-items: center; padding: 20px; flex-wrap: wrap;
  }
  .vehicles {display: flex; flex-direction: column; gap: 20px; margin-right: 20px;}
  .vehicles img {width: 100px; cursor: grab;}
  .zones {flex:1; position: relative; display: flex; flex-direction: column; justify-content: space-around; height: 80vh;}
  .zone {position: relative; text-align: center; font-size: 20px; font-weight: bold;}

  #congratsScreen {display: flex; justify-content: center; align-items: center; flex-direction: column; background: #f0f8ff;}
  #congratsScreen h1 {font-size: 48px; margin-bottom: 20px;}
  #playAgain {padding: 10px 30px; font-size: 24px; background: yellow; border: none; cursor: pointer; border-radius: 10px;}

  /* Confetti styles */
  .confetti {position: fixed; width: 10px; height: 10px; background: #f0a; top: 0; animation: fall linear forwards;}
  @keyframes fall {
    0% {transform: translateY(0) rotate(0deg);}
    100% {transform: translateY(100vh) rotate(720deg);}
  }
</style>
</head>
<body>

<!-- Innovine Logo Screen -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div class="vehicles">
    <img src="assets/airplane.png" alt="Airplane" draggable="true" id="airplane">
    <img src="assets/helicopter.png" alt="Helicopter" draggable="true" id="helicopter">
    <img src="assets/car.png" alt="Car" draggable="true" id="car">
    <img src="assets/bus.png" alt="Bus" draggable="true" id="bus">
    <img src="assets/truck.png" alt="Truck" draggable="true" id="truck">
    <img src="assets/boat.png" alt="Boat" draggable="true" id="boat">
    <img src="assets/ship.png" alt="Ship" draggable="true" id="ship">
  </div>
  <div class="zones">
    <div class="zone" id="airZone" data-type="air">Air Transport</div>
    <div class="zone" id="roadZone" data-type="road">Road Transport</div>
    <div class="zone" id="waterZone" data-type="water">Water Transport</div>
  </div>
</div>

<!-- Congratulations Screen -->
<div id="congratsScreen">
  <h1>Good Job!</h1>
  <button id="playAgain">Play Again</button>
</div>

<!-- Sounds -->
<audio id="correctSound" src="assets/excellent.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
let logoScreen = document.getElementById('logoScreen');
let gameScreen = document.getElementById('gameScreen');
let congratsScreen = document.getElementById('congratsScreen');
let correctSound = document.getElementById('correctSound');
let wrongSound = document.getElementById('wrongSound');

// Show logo screen first
logoScreen.style.display = 'flex';
setTimeout(() => {
  logoScreen.style.display = 'none';
  gameScreen.style.display = 'flex';
}, 5000);

// Drag & Drop Logic
const vehicles = document.querySelectorAll('.vehicles img');
const zones = document.querySelectorAll('.zone');
let placedCount = 0;

vehicles.forEach(vehicle => {
  vehicle.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', e.target.id);
  });
});

zones.forEach(zone => {
  zone.addEventListener('dragover', e => e.preventDefault());
  zone.addEventListener('drop', e => {
    e.preventDefault();
    const id = e.dataTransfer.getData('text');
    const vehicle = document.getElementById(id);
    let type = '';
    if(id==='airplane' || id==='helicopter') type='air';
    if(id==='car' || id==='bus' || id==='truck') type='road';
    if(id==='boat' || id==='ship') type='water';

    if(type === zone.dataset.type) {
      correctSound.currentTime = 0;
      correctSound.play();
      vehicle.style.position = 'absolute';
      vehicle.style.left = '20px';
      vehicle.style.top = `${zone.offsetTop + 20 + placedCount*50}px`;
      vehicle.setAttribute('draggable', false);
      placedCount++;
    } else {
      wrongSound.currentTime = 0;
      wrongSound.play();
    }

    if(placedCount === vehicles.length) {
      gameScreen.style.display = 'none';
      congratsScreen.style.display = 'flex';
      launchConfetti();
    }
  });
});

// Play Again
document.getElementById('playAgain').addEventListener('click', () => {
  location.reload();
});

// Confetti Function
function launchConfetti() {
  for(let i=0;i<150;i++) {
    let confetti = document.createElement('div');
    confetti.classList.add('confetti');
    confetti.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
    confetti.style.left = `${Math.random()*window.innerWidth}px`;
    confetti.style.animationDuration = `${Math.random()*2 + 3}s`;
    document.body.appendChild(confetti);
    setTimeout(() => {confetti.remove();}, 5000);
  }
}
</script>

</body>
</html>
