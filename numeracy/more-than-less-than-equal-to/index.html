<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry Crocodile River Adventure</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Comic Sans MS","Trebuchet MS",sans-serif}

.screen{
position:fixed;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
}

#logo{display:flex;background:white;z-index:5}
#logo img{width:260px;max-width:70%}

#intro,#game,#end{
background:linear-gradient(135deg,#dff8ff,#fff2d8,#eaffdf);
padding:20px;
}

.box{
background:white;
border:4px solid #e6a3c2;
border-radius:30px;
padding:30px;
width:90%;
max-width:900px;
}

h1{color:#d84f91;font-size:42px}
p{color:#51438b;font-size:22px}

button{
border:none;
border-radius:25px;
padding:15px 35px;
font-size:28px;
background:#7bbf8c;
color:white;
cursor:pointer;
}

.header{
position:absolute;
top:10px;left:10px;right:10px;
display:flex;
justify-content:space-between;
background:white;
padding:12px 20px;
border-radius:20px;
border:3px solid #e6a3c2;
color:#51438b;
font-size:25px;
}

.river{
width:90%;
height:70%;
background:linear-gradient(#8ee7ff,#36bde8);
border-radius:40px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border:5px solid #45a36b;
}

.objects{
display:flex;
justify-content:space-around;
width:90%;
font-size:55px;
}

.numbers{
font-size:45px;
color:#51438b;
font-weight:bold;
margin:15px;
}

.croc{
font-size:75px;
transition:.5s;
}

.eatLeft{transform:rotateY(180deg) scale(1.2)}
.eatRight{transform:scale(1.2)}

.options button{
background:#ffe89c;
color:#51438b;
border:3px solid #dcae35;
margin:8px;
}

.msg{
font-size:28px;
color:#d84f91;
font-weight:bold;
}

.shake{animation:shake .4s}
@keyframes shake{
25%{transform:translateX(-15px)}
50%{transform:translateX(15px)}
75%{transform:translateX(-15px)}
}

@media(max-width:700px){
h1{font-size:32px}
p{font-size:18px}
.river{height:65%}
.objects{font-size:40px}
.croc{font-size:55px}
.numbers{font-size:32px}
.options button{font-size:22px;padding:10px 25px}
}
</style>
</head>

<body>

<div id="logo" class="screen">
<img src="assets/innovine-logo.png">
</div>

<div id="intro" class="screen">
<div class="box">
<h1>🐊 Hungry Crocodile River Adventure</h1>
<p>Help the hungry crocodile choose the correct sign!</p>
<p>Look at the numbers and choose:</p>
<p><b>&gt; &nbsp;&nbsp; &lt; &nbsp;&nbsp; =</b></p>
<button onclick="startGame()">Start Game</button>
</div>
</div>


<div id="game" class="screen">

<div class="header">
<div>🐊 Crocodile Adventure</div>
<div>⭐ <span id="score">0</span>/10</div>
</div>

<div class="river">

<div class="objects">
<div id="food1">🍎</div>
<div id="food2">🍎</div>
</div>

<div class="numbers">
<span id="leftNum"></span>
&nbsp; ? &nbsp;
<span id="rightNum"></span>
</div>

<div id="croc" class="croc">🐊</div>

<div class="options">
<button onclick="check('>')">&gt;</button>
<button onclick="check('<')">&lt;</button>
<button onclick="check('=')">=</button>
</div>

<div id="msg" class="msg"></div>

</div>
</div>


<div id="end" class="screen">
<div class="box">
<h1>🎉 Well Done!</h1>
<h2 style="color:#51438b">🏆 Crocodile Champion</h2>
<h2 id="final"></h2>
<button onclick="restart()">Play Again</button>
</div>
</div>


<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>


<script>

const questions=[
[8,3],[2,7],[5,5],[9,4],[1,6],
[7,7],[3,8],[10,5],[4,4],[6,2]
];

let qList=[],index=0,score=0,tries=0;

setTimeout(()=>{
logo.style.display="none";
intro.style.display="flex";
},5000);


function startGame(){
intro.style.display="none";
game.style.display="flex";
qList=[...questions].sort(()=>Math.random()-0.5);
index=0;
score=0;
load();
}


function load(){
tries=0;
let q=qList[index];
leftNum.innerHTML=q[0];
rightNum.innerHTML=q[1];
document.getElementById("score").innerHTML=score;
msg.innerHTML="";
croc.className="croc";
}


function check(sign){

let a=qList[index][0];
let b=qList[index][1];

let answer=a>b?">":a<b?"<":"=";

if(sign==answer){

score++;
document.getElementById("score").innerHTML=score;
correct.play();

if(answer==">") croc.classList.add("eatLeft");
if(answer=="<") croc.classList.add("eatRight");

msg.innerHTML="⭐ Yummy! Great Job!";

setTimeout(next,1000);

}else{

tries++;
wrong.play();
croc.classList.add("shake");
msg.innerHTML="Oops! Try Again 😊";

if(tries>=2)setTimeout(next,1200);
}
}


function next(){
index++;
if(index>=qList.length)finish();
else load();
}


function finish(){
game.style.display="none";
end.style.display="flex";
final.innerHTML="⭐ Score: "+score+"/10";
clap.play();
}


function restart(){
end.style.display="none";
startGame();
}

</script>

</body>
</html>
