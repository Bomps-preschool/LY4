<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Than, Less Than, Equal To</title>

<style>
*{box-sizing:border-box}

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
}

.screen{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
text-align:center;
}

#logo{
display:flex;
background:white;
}

#logo img{
width:260px;
max-width:70%;
}

/* SKY THEME */

#intro,#game,#end{
background:linear-gradient(#8edcff,#dff8ff,#fff5d8);
padding:20px;
}

.cloud{
position:absolute;
font-size:70px;
opacity:.7;
}

.cloud1{top:20px;left:10%}
.cloud2{top:80px;right:10%}
.cloud3{bottom:20px;left:15%}

.box{
background:rgba(255,255,255,.9);
border-radius:40px;
padding:35px;
width:90%;
max-width:900px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
font-size:45px;
color:#6750a4;
}

p{
font-size:24px;
color:#394867;
}

.start{
background:#ff8fab;
color:white;
border:none;
padding:16px 45px;
border-radius:35px;
font-size:28px;
}

/* GAME */

.header{
position:absolute;
top:15px;
left:15px;
right:15px;
display:flex;
justify-content:space-between;
background:white;
border-radius:30px;
padding:12px 25px;
font-size:25px;
color:#6750a4;
box-shadow:0 5px 15px #aaa;
}

.titleBubble{
font-size:32px;
color:#6750a4;
}

.numberArea{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin-top:80px;
}

.numberCard{
width:160px;
height:130px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:65px;
font-weight:bold;
color:#ff6f91;
box-shadow:0 8px 20px #aaa;
}

.answerBubble{
width:120px;
height:120px;
border-radius:50%;
border:5px dashed #6750a4;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
font-size:55px;
color:#6750a4;
}

.options{
display:flex;
justify-content:center;
gap:25px;
margin-top:40px;
}

.bubbleBtn{
width:120px;
height:120px;
border-radius:50%;
border:5px solid white;
font-size:55px;
color:#394867;
box-shadow:0 8px 20px #999;
cursor:pointer;
}

.more{background:#b9fbc0}
.less{background:#a9def9}
.equal{background:#e4c1f9}

.pop{
animation:pop .5s;
}

@keyframes pop{
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.msg{
font-size:30px;
color:#ff6f91;
font-weight:bold;
margin-top:20px;
}

@media(max-width:700px){

.numberCard{
width:100px;
height:100px;
font-size:45px;
}

.answerBubble,.bubbleBtn{
width:85px;
height:85px;
font-size:38px;
}

.options{
gap:10px;
}

h1{font-size:32px}

p{font-size:18px}

}

</style>
</head>

<body>

<div id="logo" class="screen">
<img src="assets/innovine-logo.png">
</div>


<div id="intro" class="screen">

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>

<div class="box">
<h1>🫧 More Than, Less Than, Equal To 🫧</h1>
<p>Compare the numbers and click on the correct symbol!</p>
<p>Choose: &gt; &nbsp; &lt; &nbsp; =</p>
<button class="start" onclick="startGame()">Start Game</button>
</div>

</div>


<div id="game" class="screen">

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>

<div class="header">
<div>🫧 More Than, Less Than, Equal To</div>
<div>⭐ <span id="score">0</span>/10</div>
</div>


<div>

<div class="numberArea">

<div class="numberCard" id="left"></div>

<div class="answerBubble" id="answer">?</div>

<div class="numberCard" id="right"></div>

</div>


<div class="options">

<button class="bubbleBtn more" onclick="check('>')">&gt;</button>

<button class="bubbleBtn less" onclick="check('<')">&lt;</button>

<button class="bubbleBtn equal" onclick="check('=')">=</button>

</div>


<div id="msg" class="msg"></div>

</div>

</div>


<div id="end" class="screen">

<div class="box">

<h1>🎉 Amazing!</h1>

<p>🏆 You Are Champion</p>

<h2 id="final"></h2>

<button class="start" onclick="restart()">Play Again</button>

</div>

</div>


<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>
<audio id="clap" src="assets/claps.mp3"></audio>


<script>

let questions=[
[7,3],[2,9],[5,5],[8,2],[1,6],
[4,4],[9,7],[3,10],[6,6],[10,5]
];

let q=[];
let index=0;
let score=0;
let attempts=0;


setTimeout(()=>{
logo.style.display="none";
intro.style.display="flex";
},5000);


function startGame(){

intro.style.display="none";
game.style.display="flex";

q=[...questions].sort(()=>Math.random()-0.5);

index=0;
score=0;

loadQuestion();

}


function loadQuestion(){

attempts=0;

left.innerHTML=q[index][0];
right.innerHTML=q[index][1];

answer.innerHTML="?";

msg.innerHTML="";

document.getElementById("score").innerHTML=score;

}


function check(symbol){

let a=q[index][0];
let b=q[index][1];

let correctSymbol=a>b?">":a<b?"<":"=";


if(symbol==correctSymbol){

score++;

document.getElementById("score").innerHTML=score;

answer.innerHTML=symbol;

answer.classList.add("pop");

correct.play();

msg.innerHTML="⭐ Great Job!";

setTimeout(nextQuestion,1000);


}else{

attempts++;

wrong.play();

msg.innerHTML="Try Again 😊";


if(attempts>=2){

answer.innerHTML=correctSymbol;

msg.innerHTML="⭐ Correct answer: "+a+" "+correctSymbol+" "+b;

setTimeout(nextQuestion,1500);

}

}

}


function nextQuestion(){

index++;

if(index>=q.length){

finish();

}else{

loadQuestion();

}

}


function finish(){

game.style.display="none";

end.style.display="flex";

final.innerHTML="⭐ Score: "+score+"/10";

clap.play();

}


function restart(){

end.style.display="none";

startGame();

}

</script>

</body>
</html>
