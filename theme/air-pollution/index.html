<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Clean the Sky Mission – Air Hero</title>


<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none;
}

html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

font-family:
"Comic Sans MS",
"Trebuchet MS",
Arial,
sans-serif;

background:white;

}


/* ---------------- COMMON SCREENS ---------------- */

.screen{

position:fixed;

top:0;
left:0;

width:100%;
height:100vh;
height:100dvh;

display:none;

overflow:hidden;

}

.screen.active{

display:flex;

}


/* ---------------- LOGO SCREEN ---------------- */

#logoScreen{

background:white;

justify-content:center;
align-items:center;

z-index:1000;

}

#logoScreen img{

width:270px;

max-width:70%;

animation:logoPop 1.2s ease;

}

@keyframes logoPop{

0%{

transform:scale(.65);

opacity:0;

}

70%{

transform:scale(1.07);

}

100%{

transform:scale(1);

opacity:1;

}

}


/* ---------------- INTRO SCREEN ---------------- */

#introScreen{

background:

linear-gradient(

rgba(60,70,80,.30),

rgba(60,70,80,.42)

),

url("assets/polluted-city.png");

background-size:cover;

background-position:center;

justify-content:center;

align-items:center;

padding:15px;

}

.intro-panel{

position:relative;

width:min(920px,96%);

height:min(640px,94%);

background:rgba(255,255,255,.92);

border:7px solid white;

border-radius:35px;

box-shadow:

0 13px 0 rgba(45,72,89,.20),

0 20px 45px rgba(0,0,0,.25);

display:flex;

align-items:center;

justify-content:space-around;

gap:15px;

padding:25px;

overflow:hidden;

}

.intro-panel::before{

content:"";

position:absolute;

left:-80px;

top:-100px;

width:270px;

height:270px;

border-radius:50%;

background:rgba(181,225,255,.35);

}

.hero-area{

position:relative;

width:44%;

height:90%;

display:flex;

justify-content:center;

align-items:flex-end;

}

.hero-area img{

max-width:100%;

max-height:95%;

object-fit:contain;

filter:

drop-shadow(

0 10px 5px rgba(0,0,0,.18)

);

animation:

heroFloat 2.3s ease-in-out infinite;

}

@keyframes heroFloat{

0%,
100%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

}

.intro-content{

position:relative;

width:52%;

text-align:center;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:2;

}

.intro-title{

margin:0;

font-size:

clamp(

30px,

4vw,

58px

);

line-height:1.05;

color:#1676b9;

text-shadow:

2px 2px 0 white;

}

.intro-message{

margin:

20px 0;

font-size:

clamp(

19px,

2.3vw,

31px

);

line-height:1.4;

font-weight:bold;

color:#34495e;

}

.start-button{

border:none;

padding:

16px 35px;

border-radius:100px;

font-family:inherit;

font-size:

clamp(

20px,

2.3vw,

30px

);

font-weight:bold;

color:white;

background:

linear-gradient(

180deg,

#37c76b,

#13994a

);

box-shadow:

0 8px 0 #087435,

0 13px 20px rgba(0,0,0,.18);

cursor:pointer;

transition:.15s;

}

.start-button:active{

transform:translateY(7px);

box-shadow:

0 2px 0 #087435;

}


/* ---------------- GAME SCREEN ---------------- */

#gameScreen{

flex-direction:column;

background:#caecff;

}


/* CITY */

.city-background{

position:absolute;

inset:0;

background-image:

url("assets/polluted-city.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

z-index:0;

}

.clean-layer{

position:absolute;

inset:0;

background-image:

url("assets/clean-city.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

opacity:0;

transition:

opacity 1.2s ease;

z-index:1;

}

.city-shade{

position:absolute;

inset:0;

background:

linear-gradient(

rgba(255,255,255,.30),

rgba(255,255,255,.13)

);

z-index:2;

}


/* GAME CONTENT */

.game-content{

position:relative;

z-index:5;

width:100%;

height:100%;

display:flex;

flex-direction:column;

padding:

10px 18px 14px;

}


/* HEADER */

.game-header{

height:11%;

min-height:66px;

display:flex;

align-items:center;

justify-content:space-between;

gap:10px;

}

.game-title{

background:

rgba(255,255,255,.95);

border:

4px solid white;

border-radius:22px;

padding:

9px 20px;

font-weight:bold;

font-size:

clamp(

21px,

3vw,

37px

);

color:#087cb7;

box-shadow:

0 6px 0 rgba(0,102,155,.18);

white-space:nowrap;

}

.score-box{

background:

linear-gradient(

180deg,

#fff9b2,

#ffd95f

);

border:

4px solid white;

border-radius:22px;

padding:

9px 18px;

font-size:

clamp(

19px,

2.5vw,

31px

);

font-weight:bold;

color:#745000;

box-shadow:

0 6px 0 rgba(144,101,0,.20);

white-space:nowrap;

}


/* QUESTION */

.question-area{

height:13%;

display:flex;

justify-content:center;

align-items:center;

padding:3px;

}


.question-box{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.question-audio-button{
    border:none;
    width:55px;
    height:55px;
    border-radius:50%;
    background:#167db5;
    color:white;
    font-size:28px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    box-shadow:0 5px 0 rgba(0,102,155,.25);
}

.question-audio-button:active{
    transform:translateY(4px);
    box-shadow:none;
}
.question-box{

background:

rgba(255,255,255,.97);

border:

5px solid white;

border-radius:25px;

padding:

8px 25px;

box-shadow:

0 7px 0 rgba(33,93,127,.18);

font-size:

clamp(

21px,

3vw,

37px

);

font-weight:bold;

color:#273c50;

text-align:center;

max-width:900px;

}


.question-audio-button{

position:absolute;

right:18px;

background:#167db5;

color:white;

border:4px solid white;

border-radius:50%;

width:55px;

height:55px;

font-size:28px;

cursor:pointer;

box-shadow:0 5px 0 rgba(0,0,0,.18);

}

.question-audio-button:active{

transform:translateY(4px);

}

/* MISSION AREA */

.mission-area{

position:relative;

height:47%;

display:flex;

justify-content:center;

align-items:center;

}

.mission-drop{

position:relative;

width:min(480px,62vw);

height:94%;

border:

6px dashed rgba(255,255,255,.96);

border-radius:35px;

background:

rgba(255,255,255,.84);

box-shadow:

0 10px 25px rgba(20,79,107,.22);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

transition:.2s;

overflow:hidden;

}

.mission-drop.drag-over{

transform:scale(1.025);

background:

rgba(235,255,225,.96);

border-color:#50c662;

}

.mission-label{

position:absolute;

top:7px;

padding:

5px 18px;

background:#167db5;

color:white;

border-radius:100px;

font-weight:bold;

font-size:

clamp(

13px,

1.5vw,

19px

);

z-index:5;

}


/* NO ANSWER SHOWN BEFORE CLICK */

.answer-placeholder{

width:88%;

height:78%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

animation:

placeholderFloat 2s ease-in-out infinite;

}

.placeholder-cloud{

font-size:

clamp(

45px,

7vw,

80px

);

line-height:.9;

}

.placeholder-question{

margin-top:-8px;

font-size:

clamp(

38px,

5vw,

65px

);

font-weight:bold;

color:#167db5;

text-shadow:

2px 3px 0 white;

}

.placeholder-text{

font-size:

clamp(

13px,

1.6vw,

20px

);

font-weight:bold;

color:#476477;

max-width:90%;

text-align:center;

}

@keyframes placeholderFloat{

0%,
100%{

transform:translateY(4px);

}

50%{

transform:translateY(-7px);

}

}


/* ANSWER APPEARS ONLY AFTER CORRECT CLICK */

.revealed-answer{

width:88%;

height:79%;

display:none;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}

.revealed-answer.show{

display:flex;

animation:

answerReveal .55s ease;

}

.revealed-image{

width:90%;

height:75%;

max-height:180px;

object-fit:contain;

filter:

drop-shadow(

0 8px 5px rgba(0,0,0,.18)

);

}

.revealed-emoji{

font-size:

clamp(

70px,

11vw,

135px

);

line-height:1;

}

.revealed-text{

margin-top:3px;

padding:

5px 20px;

background:

#dffff0;

border:

4px solid white;

border-radius:100px;

font-size:

clamp(

17px,

2.2vw,

28px

);

font-weight:bold;

color:#08723b;

box-shadow:

0 5px 0 rgba(23,130,65,.18);

}

@keyframes answerReveal{

0%{

transform:scale(.25);

opacity:0;

}

70%{

transform:scale(1.08);

opacity:1;

}

100%{

transform:scale(1);

opacity:1;

}

}


/* AIR HERO */

.mini-hero{

position:absolute;

right:2%;

bottom:1%;

width:min(185px,18vw);

height:85%;

display:flex;

align-items:flex-end;

}

.mini-hero img{

max-width:100%;

max-height:100%;

object-fit:contain;

filter:

drop-shadow(

0 7px 4px rgba(0,0,0,.20)

);

}


/* FEEDBACK */

.feedback{

position:absolute;

left:50%;

top:50%;

transform:

translate(-50%,-50%)

scale(0);

min-width:270px;

padding:

18px 25px;

border:

6px solid white;

border-radius:28px;

background:

linear-gradient(

180deg,

#dffff0,

#81e89e

);

box-shadow:

0 11px 30px rgba(0,0,0,.25);

font-size:

clamp(

23px,

3vw,

38px

);

font-weight:bold;

color:#076c34;

text-align:center;

z-index:20;

opacity:0;

pointer-events:none;

}

.feedback.show{

animation:

feedbackPop 1.3s ease forwards;

}

@keyframes feedbackPop{

0%{

transform:

translate(-50%,-50%)

scale(.25);

opacity:0;

}

20%{

transform:

translate(-50%,-50%)

scale(1.12);

opacity:1;

}

75%{

transform:

translate(-50%,-50%)

scale(1);

opacity:1;

}

100%{

transform:

translate(-50%,-50%)

scale(.82);

opacity:0;

}

}


/* OPTIONS */

.options-area{

height:29%;

display:flex;

justify-content:center;

align-items:center;

gap:

clamp(

8px,

2vw,

25px

);

padding-top:7px;

}

.option-card{

position:relative;

width:min(280px,30.5%);

height:93%;

border:

6px solid white;

border-radius:28px;

background:

rgba(255,255,255,.97);

box-shadow:

0 9px 0 rgba(39,106,141,.25);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:3px;

padding:

7px 9px;

cursor:pointer;

transition:

transform .15s,

box-shadow .15s,

background .2s;

touch-action:none;

}

.option-card:active{

transform:translateY(6px);

box-shadow:

0 3px 0 rgba(39,106,141,.25);

}

.option-image{

width:85%;

height:65%;

object-fit:contain;

max-height:130px;

pointer-events:none;

}

.option-emoji{

font-size:

clamp(

36px,

6vh,

67px

);

line-height:1;

}

.option-text{

font-size:

clamp(

16px,

2vw,

27px

);

font-weight:bold;

color:#253d50;

text-align:center;

line-height:1.1;

pointer-events:none;

}

.option-card.wrong{

animation:

jiggle .45s ease;

background:#ffd6d6;

border-color:#ff8080;

}

@keyframes jiggle{

0%,
100%{

transform:translateX(0);

}

20%{

transform:

translateX(-13px)

rotate(-2deg);

}

40%{

transform:

translateX(13px)

rotate(2deg);

}

60%{

transform:

translateX(-9px)

rotate(-1deg);

}

80%{

transform:

translateX(9px)

rotate(1deg);

}

}

.option-card.hint{

animation:

hintGlow .75s ease-in-out infinite alternate;

background:#edffe3;

}

@keyframes hintGlow{

from{

transform:scale(1);

box-shadow:

0 8px 0 #49ad55,

0 0 10px #72f279;

}

to{

transform:scale(1.055);

box-shadow:

0 8px 0 #168b35,

0 0 35px #49ef69;

}

}

.option-card.correct{

background:#d9ffe0;

border-color:#45c45b;

transform:scale(1.04);

box-shadow:

0 8px 0 #2c9e40,

0 0 28px #4aed67;

}


/* DRAG IMAGE */

.drag-ghost{

position:fixed;

z-index:5000;

width:170px;

height:130px;

opacity:.90;

pointer-events:none;

transform:

translate(-50%,-50%)

rotate(3deg)

scale(.9);

}


/* ---------------- END SCREEN ---------------- */

#endScreen{

justify-content:center;

align-items:center;

padding:15px;

background:

url("assets/clean-city.png");

background-size:cover;

background-position:center;

}

.end-overlay{

position:absolute;

inset:0;

background:

rgba(255,255,255,.19);

}

.end-card{

position:relative;

z-index:3;

width:min(760px,94%);

height:min(590px,92%);

background:

rgba(255,255,255,.94);

border:

8px solid white;

border-radius:42px;

box-shadow:

0 16px 0 rgba(18,104,142,.18),

0 25px 60px rgba(0,0,0,.25);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:18px;

}

.end-hero{

height:42%;

max-width:60%;

object-fit:contain;

filter:

drop-shadow(

0 8px 5px rgba(0,0,0,.18)

);

animation:

heroCelebrate 1.1s ease-in-out infinite alternate;

}

@keyframes heroCelebrate{

from{

transform:

rotate(-3deg)

translateY(3px);

}

to{

transform:

rotate(3deg)

translateY(-10px);

}

}

.end-title{

margin:5px 0;

font-size:

clamp(

34px,

5vw,

66px

);

color:#087ebc;

text-shadow:

2px 3px 0 #d9f4ff;

}

.final-score{

margin:

4px 0 15px;

padding:

8px 30px;

background:

linear-gradient(

180deg,

#fff59a,

#ffd249

);

border:

5px solid white;

border-radius:100px;

font-size:

clamp(

25px,

3.7vw,

43px

);

font-weight:bold;

color:#765300;

box-shadow:

0 6px 0 rgba(118,83,0,.20);

}

.play-again{

border:none;

border-radius:100px;

padding:

15px 38px;

background:

linear-gradient(

180deg,

#39c872,

#11924a

);

box-shadow:

0 8px 0 #087036;

font-family:inherit;

font-size:

clamp(

21px,

2.8vw,

33px

);

font-weight:bold;

color:white;

cursor:pointer;

}

.play-again:active{

transform:translateY(7px);

box-shadow:

0 2px 0 #087036;

}


/* ---------------- CONFETTI ---------------- */

.confetti-piece{

position:fixed;

top:-35px;

z-index:100;

width:12px;

height:22px;

border-radius:3px;

animation:

confettiFall linear forwards;

}

@keyframes confettiFall{

0%{

transform:

translateY(-40px)

rotate(0deg);

}

100%{

transform:

translateY(115vh)

rotate(760deg);

}

}


/* ---------------- MOBILE ---------------- */

@media(max-width:700px){

.intro-panel{

flex-direction:column;

padding:14px;

gap:2px;

}

.hero-area{

width:100%;

height:45%;

}

.intro-content{

width:100%;

height:53%;

}

.intro-message{

margin:

8px 0 12px;

}

.game-content{

padding:7px;

}

.game-header{

height:10%;

min-height:56px;

}

.game-title{

padding:

7px 10px;

font-size:

clamp(

17px,

4.3vw,

24px

);

}

.score-box{

padding:

7px 9px;

font-size:

clamp(

16px,

4vw,

22px

);

}

.question-area{

height:14%;

}

.question-box{

padding:

7px 12px;

font-size:

clamp(

18px,

4.6vw,

26px

);

}

.mission-area{

height:42%;

}

.mission-drop{

width:75vw;

height:96%;

}

.mini-hero{

width:24vw;

right:0;

}

.options-area{

height:34%;

gap:6px;

}

.option-card{

height:92%;

border-width:4px;

border-radius:20px;

padding:5px;

}

.option-image{

width:82%;

height:55%;

}

.option-text{

font-size:

clamp(

13px,

3.5vw,

19px

);

}

}


/* ---------------- SHORT LANDSCAPE ---------------- */

@media(max-height:600px) and (orientation:landscape){

.game-content{

padding:

5px 12px;

}

.game-header{

height:12%;

min-height:47px;

}

.game-title,
.score-box{

padding:

5px 14px;

border-radius:17px;

}

.question-area{

height:15%;

}

.question-box{

padding:

4px 16px;

border-width:4px;

}

.mission-area{

height:43%;

}

.mission-drop{

height:96%;

width:min(390px,50vw);

}

.mission-label{

top:2px;

padding:

3px 13px;

}

.options-area{

height:30%;

}

.option-card{

height:96%;

border-width:4px;

border-radius:20px;

padding:3px;

}

.option-image{

height:56%;

}

}


/* ---------------- VERY SMALL SCREEN ---------------- */

@media(max-width:410px){

.game-title{

font-size:16px;

}

.score-box{

font-size:15px;

}

.question-box{

font-size:18px;

}

.option-text{

font-size:12px;

}

.mission-label{

font-size:11px;

}

}

</style>

</head>

?

>

></audio>

src="assets/wrong.mp3"
></audio>

<audio

preload="auto"
></audio>



<script>


/* ---------------- QUESTIONS ---------------- */


const questions=[


{

question:

"Which one makes the air dirty?",

audio:

options:[


{

image:"assets/car-smoke.png",

correct:true

},


{

text:"Bicycle",

image:"assets/bicycle.png",

correct:false

},


{

text:"Tree",

image:"assets/tree.png",

correct:false

}


]

},



{

question:

"What helps clean the air?",

audio:

"assets/question-2.mp3",

options:[


{

text:"Tree",

image:"assets/tree.png",

correct:true

},


{

text:"Factory Smoke",

image:"assets/factory-smoke.png",

correct:false

},


{

text:"Burning Garbage",

image:"assets/burning-garbage.png",

correct:false

}


]

},



{

question:

"What should we use more?",

audio:

"assets/question-3.mp3",

options:[


{

text:"Bicycle",

image:"assets/bicycle.png",

correct:true

},


{

text:"More Cars",

image:"assets/car-smoke.png",

correct:false

},


{

text:"Fire",

image:"assets/burning-garbage.png",

correct:false

}


]

},



{

question:

"What should factories do?",

audio:

"assets/question-4.mp3",

options:[


{

text:"Control Smoke",

emoji:"✅🏭",

correct:true

},


{

text:"Release More Smoke",

image:"assets/factory-smoke.png",

correct:false

},


{

text:"Burn Waste",

image:"assets/burning-garbage.png",

correct:false

}


]

},



{

question:

"Which one causes harmful smoke?",

audio:

"assets/question-5.mp3",

options:[


{

text:"Burning Garbage",

image:"assets/burning-garbage.png",

correct:true

},


{

text:"Green Tree",

image:"assets/tree.png",

correct:false

},


{

text:"Bicycle",

image:"assets/bicycle.png",

correct:false

}


]

},



{

question:

"Which is a smarter way to travel?",

audio:

"assets/question-6.mp3",

options:[


{

text:"Bus",

image:"assets/bus.png",

correct:true

},


{

text:"Smoky Car",

image:"assets/car-smoke.png",

correct:false

},


{

text:"Burning Waste",

image:"assets/burning-garbage.png",

correct:false

}


]

},



{

question:

"What can we plant to help the air?",

audio:

"assets/question-7.mp3",

options:[


{

text:"Tree",

image:"assets/tree.png",

correct:true

},


{

text:"Factory",

image:"assets/factory-smoke.png",

correct:false

},


{

text:"Smoke Car",

image:"assets/car-smoke.png",

correct:false

}


]

},



{

question:

"Which choice reduces air pollution?",

audio:

"assets/question-8.mp3",

options:[


{

text:"Ride a Bicycle",

image:"assets/bicycle.png",

correct:true

},


{

text:"Burn Garbage",

image:"assets/burning-garbage.png",

correct:false

},


{

text:"Make More Smoke",

image:"assets/factory-smoke.png",

correct:false

}


]

},



{

question:

"What should we avoid burning?",

audio:

"assets/question-9.mp3",

options:[


{

text:"Garbage",

image:"assets/burning-garbage.png",

correct:true

},


{

text:"Use a Bus",

image:"assets/bus.png",

correct:false

},


{

text:"Plant Trees",

image:"assets/tree.png",

correct:false

}


]

},



{

question:

"What can make the city sky smoky?",

audio:

"assets/question-10.mp3",

options:[


{

text:"Factory Smoke",

image:"assets/factory-smoke.png",

correct:true

},


{

text:"Trees",

image:"assets/tree.png",

correct:false

},


{

text:"Bicycles",

image:"assets/bicycle.png",

correct:false

}


]

}


];



/* ---------------- ELEMENTS ---------------- */


const logoScreen=

document.getElementById(

"logoScreen"

);


const introScreen=

document.getElementById(

"introScreen"

);


const gameScreen=

document.getElementById(

"gameScreen"

);


const endScreen=

document.getElementById(

"endScreen"

);


const startButton=

document.getElementById(

"startButton"

);


const playAgain=

document.getElementById(

"playAgain"

);


const questionText=

document.getElementById(

"questionText"

);


const optionsArea=

document.getElementById(

"optionsArea"

);


const scoreText=

document.getElementById(

"score"

);


const finalScore=

document.getElementById(

"finalScore"

);


const feedback=

document.getElementById(

"feedback"

);


const cleanLayer=

document.getElementById(

"cleanLayer"

);


const missionDrop=

document.getElementById(

"missionDrop"

);


const answerPlaceholder=

document.getElementById(

"answerPlaceholder"

);


const revealedAnswer=

document.getElementById(

"revealedAnswer"

);


const clapsSound=

document.getElementById(

"clapsSound"

);


const wrongSound=

document.getElementById(

"wrongSound"

);

const questionSound=

document.getElementById(

"questionSound"

);

const questionAudioButton=

document.getElementById(

"questionAudioButton"

);



/* ---------------- VARIABLES ---------------- */


let gameQuestions=[];

let questionNumber=0;

let score=0;

let wrongAttempts=0;

let questionLocked=false;

let draggedCard=null;

let touchCard=null;

let dragGhost=null;

let touchStartX=0;

let touchStartY=0;

let touchMoved=false;



/* ---------------- SCREEN ---------------- */


function showScreen(

screen

){

logoScreen.classList.remove(

"active"

);


introScreen.classList.remove(

"active"

);


gameScreen.classList.remove(

"active"

);


endScreen.classList.remove(

"active"

);


screen.classList.add(

"active"

);

}



/* ---------------- LOGO TIMER ---------------- */


setTimeout(

function(){

showScreen(

introScreen

);

},

2400

);



/* ---------------- SHUFFLE ---------------- */


function shuffle(

array

){

let copied=

array.slice();


for(

let i=

copied.length-1;

i>0;

i--

){

let randomIndex=

Math.floor(

Math.random()*

(i+1)

);


let temporary=

copied[i];


copied[i]=

copied[randomIndex];


copied[randomIndex]=

temporary;

}


return copied;

}



/* ---------------- AUDIO ---------------- */


function playAudio(

audio

){

try{

audio.pause();

audio.currentTime=0;

audio.play();

}

catch(error){

}

}



/* ---------------- START ---------------- */


startButton.addEventListener(

"click",

startGame

);


playAgain.addEventListener(

"click",

startGame

);

questionAudioButton.addEventListener(

"click",

playQuestionAudio

);



function startGame(){

removeConfetti();


gameQuestions=

shuffle(

questions

);


questionNumber=0;

score=0;

wrongAttempts=0;

questionLocked=false;


scoreText.textContent=

"0";


cleanLayer.style.opacity=

"0";


/* LOAD QUESTION BEFORE SHOWING GAME */

loadQuestion();


showScreen(

gameScreen

);

}





function playQuestionAudio(){

const current=gameQuestions[questionNumber];

if(!current || !current.audio){return;}

questionSound.pause();

questionSound.currentTime=0;

questionSound.src=current.audio;

questionSound.play().catch(function(){});

}

/* ---------------- LOAD QUESTION ---------------- */


function loadQuestion(){

questionLocked=false;

wrongAttempts=0;


feedback.classList.remove(

"show"

);


missionDrop.classList.remove(

"drag-over"

);


/* CLEAR OLD ANSWER BEFORE NEXT QUESTION */

revealedAnswer.classList.remove(

"show"

);


revealedAnswer.innerHTML="";


answerPlaceholder.style.display=

"flex";


const current=

gameQuestions[

questionNumber

];


document.getElementById("questionTextContent").textContent=

current.question;

setTimeout(playQuestionAudio,350);


optionsArea.innerHTML="";


const mixedOptions=

shuffle(

current.options

);


mixedOptions.forEach(

function(

option

){

const card=

document.createElement(

"div"

);


card.className=

"option-card";


card.setAttribute(

"draggable",

"true"

);


card.optionData=

option;



if(

option.image

){

const image=

document.createElement(

"img"

);


image.className=

"option-image";


image.src=

option.image;


image.alt=

option.text;


card.appendChild(

image

);

}


else{

const emoji=

document.createElement(

"div"

);


emoji.className=

"option-emoji";


emoji.textContent=

option.emoji;


card.appendChild(

emoji

);

}



const text=

document.createElement(

"div"

);


text.className=

"option-text";


text.textContent=

option.text;


card.appendChild(

text

);



/* TAP */


card.addEventListener(

"click",

function(){

if(

touchMoved

){

touchMoved=false;

return;

}


checkAnswer(

card,

option

);

}

);



/* COMPUTER DRAG */


card.addEventListener(

"dragstart",

function(

event

){

if(

questionLocked

){

event.preventDefault();

return;

}


draggedCard=

card;


event.dataTransfer.effectAllowed=

"move";


setTimeout(

function(){

card.style.opacity=

".35";

},

0

);

}

);


card.addEventListener(

"dragend",

function(){

card.style.opacity=

"1";


draggedCard=null;


missionDrop.classList.remove(

"drag-over"

);

}

);



/* TOUCH DRAG */


card.addEventListener(

"touchstart",

touchDragStart,

{

passive:true

}

);


card.addEventListener(

"touchmove",

touchDragMove,

{

passive:false

}

);


card.addEventListener(

"touchend",

touchDragEnd,

{

passive:false

}

);


optionsArea.appendChild(

card

);

}

);

}



/* ---------------- COMPUTER DROP ---------------- */


missionDrop.addEventListener(

"dragover",

function(

event

){

event.preventDefault();


if(

!questionLocked

){

missionDrop.classList.add(

"drag-over"

);

}

}

);


missionDrop.addEventListener(

"dragleave",

function(){

missionDrop.classList.remove(

"drag-over"

);

}

);


missionDrop.addEventListener(

"drop",

function(

event

){

event.preventDefault();


missionDrop.classList.remove(

"drag-over"

);


if(

draggedCard

){

checkAnswer(

draggedCard,

draggedCard.optionData

);

}

}

);



/* ---------------- TOUCH DRAG ---------------- */


function touchDragStart(

event

){

if(

questionLocked

){

return;

}


touchCard=

event.currentTarget;


const touch=

event.touches[0];


touchStartX=

touch.clientX;


touchStartY=

touch.clientY;


touchMoved=false;

}



function touchDragMove(

event

){

if(

!touchCard

){

return;

}


const touch=

event.touches[0];


const moveDistance=

Math.abs(

touch.clientX-

touchStartX

)

+

Math.abs(

touch.clientY-

touchStartY

);


if(

moveDistance<12

){

return;

}


touchMoved=true;


event.preventDefault();


if(

!dragGhost

){

dragGhost=

touchCard.cloneNode(

true

);


dragGhost.classList.add(

"drag-ghost"

);


document.body.appendChild(

dragGhost

);


touchCard.style.opacity=

".35";

}


dragGhost.style.left=

touch.clientX+

"px";


dragGhost.style.top=

touch.clientY+

"px";


const rectangle=

missionDrop.getBoundingClientRect();


if(

touch.clientX>=rectangle.left

&&

touch.clientX<=rectangle.right

&&

touch.clientY>=rectangle.top

&&

touch.clientY<=rectangle.bottom

){

missionDrop.classList.add(

"drag-over"

);

}

else{

missionDrop.classList.remove(

"drag-over"

);

}

}



function touchDragEnd(

event

){

if(

!touchCard

){

return;

}


if(

touchMoved

){

event.preventDefault();


const touch=

event.changedTouches[0];


const rectangle=

missionDrop.getBoundingClientRect();


const dropped=

touch.clientX>=rectangle.left

&&

touch.clientX<=rectangle.right

&&

touch.clientY>=rectangle.top

&&

touch.clientY<=rectangle.bottom;


if(

dropped

){

checkAnswer(

touchCard,

touchCard.optionData

);

}

}


touchCard.style.opacity=

"1";


if(

dragGhost

){

dragGhost.remove();


dragGhost=null;

}


missionDrop.classList.remove(

"drag-over"

);


touchCard=null;


setTimeout(

function(){

touchMoved=false;

},

100

);

}



/* ---------------- CHECK ---------------- */


function checkAnswer(

card,

option

){

if(

questionLocked

){

return;

}


if(

option.correct

){

correctAnswer(

card,

option

);

}

else{

wrongAnswer(

card

);

}

}



/* ---------------- WRONG ---------------- */


function wrongAnswer(

card

){

wrongAttempts++;


playAudio(

wrongSound

);


card.classList.remove(

"wrong"

);


card.offsetHeight;


card.classList.add(

"wrong"

);


setTimeout(

function(){

card.classList.remove(

"wrong"

);

},

520

);



if(

wrongAttempts>=2

){

const cards=

document.querySelectorAll(

".option-card"

);


cards.forEach(

function(

item

){

if(

item.optionData.correct

){

item.classList.add(

"hint"

);

}

}

);


feedback.innerHTML=

"💡 Look for the glowing answer!";


feedback.style.background=

"linear-gradient(180deg,#fff9cc,#ffd766)";


feedback.style.color=

"#755500";


feedback.classList.remove(

"show"

);


feedback.offsetHeight;


feedback.classList.add(

"show"

);

}

}



/* ---------------- SHOW CORRECT ANSWER ---------------- */


function revealCorrectAnswer(

option

){

answerPlaceholder.style.display=

"none";


revealedAnswer.innerHTML="";


if(

option.image

){

const image=

document.createElement(

"img"

);


image.className=

"revealed-image";


image.src=

option.image;


image.alt=

option.text;


revealedAnswer.appendChild(

image

);

}


else{

const emoji=

document.createElement(

"div"

);


emoji.className=

"revealed-emoji";


emoji.textContent=

option.emoji;


revealedAnswer.appendChild(

emoji

);

}



const answerText=

document.createElement(

"div"

);


answerText.className=

"revealed-text";


answerText.textContent=

"✅ "+

option.text;


revealedAnswer.appendChild(

answerText

);


revealedAnswer.classList.add(

"show"

);

}



/* ---------------- CORRECT ---------------- */


function correctAnswer(

card,

option

){

questionLocked=true;


card.classList.remove(

"hint"

);


card.classList.add(

"correct"

);


/* ANSWER IS SHOWN ONLY NOW */

revealCorrectAnswer(

option

);


score++;


scoreText.textContent=

score;


cleanLayer.style.opacity=

String(

score/10

);


feedback.innerHTML=

"✅ Great Job, Air Hero!";


feedback.style.background=

"linear-gradient(180deg,#e2fff0,#78e596)";


feedback.style.color=

"#086c34";


feedback.classList.remove(

"show"

);


feedback.offsetHeight;


feedback.classList.add(

"show"

);


playAudio(

clapsSound

);



clapsSound.onended = function(){

questionNumber++;

if(

questionNumber<

gameQuestions.length

){

loadQuestion();

}

else{

finishGame();

}

};

}



/* ---------------- FINISH ---------------- */


function finishGame(){

finalScore.textContent=

score;


showScreen(

endScreen

);


playAudio(

clapsSound

);


createConfetti();

}



/* ---------------- CONFETTI ---------------- */


function createConfetti(){

removeConfetti();


const colours=[

"#ff4f72",

"#ffd538",

"#26c67a",

"#3da8ff",

"#a758ef",

"#ff8a2c"

];


for(

let i=0;

i<150;

i++

){

const piece=

document.createElement(

"div"

);


piece.className=

"confetti-piece";


piece.style.left=

Math.random()*100+

"vw";


piece.style.background=

colours[

Math.floor(

Math.random()*

colours.length

)

];


piece.style.animationDuration=

(

2.7+

Math.random()*3

)+

"s";


piece.style.animationDelay=

(

Math.random()*2.4

)+

"s";


document.body.appendChild(

piece

);

}

}



function removeConfetti(){

document.querySelectorAll(

".confetti-piece"

).forEach(

function(

piece

){

piece.remove();

}

);

}


</script>


</body>

</html>
