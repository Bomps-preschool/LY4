<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Helpers Game</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background-color: #FFE5CC;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}
#game-container {
    background-color: #FFCCCC;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
h2#instruction {
    font-size: 1.8em;
    margin-bottom: 30px;
    font-weight: bold;
}
h3#question {
    font-size: 1.5em;
    margin-bottom: 20px;
}
button.option-btn {
    padding: 15px 25px;
    margin: 10px;
    font-size: 1em;
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid #888;
    transition: transform 0.2s;
}
button.option-btn:hover {
    transform: scale(1.05);
}
button#play-again {
    padding: 15px 25px;
    margin-top: 30px;
    font-size: 1.2em;
    background-color: #FFEB3B;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="game-container">
    <h2 id="instruction">Listen to the question and choose the correct answer</h2>
    <h3 id="question"></h3>
    <div id="options-container">
        <button class="option-btn"></button>
        <button class="option-btn"></button>
        <button class="option-btn"></button>
        <button class="option-btn"></button>
        <button class="option-btn"></button>
    </div>
    <button id="play-again" style="display:none;">Play Again</button>
</div>

<audio id="audio-question"></audio>
<audio id="audio-correct" src="assets/correct.mp3"></audio>
<audio id="audio-wrong" src="assets/wrong.mp3"></audio>
<audio id="audio-clap" src="assets/claps.mp3"></audio>

<script>
const questions = [
    {text: "Who helps you keep the surroundings clean?", options: ["Sweeper","Doctor","Teacher","Postman","Firefighter"], answer: "Sweeper", audio: "assets/question-1.mp3"},
    {text: "Who treats sick people?", options: ["Sweeper","Doctor","Teacher","Postman","Firefighter"], answer: "Doctor", audio: "assets/question-2.mp3"},
    {text: "Who teaches you at school?", options: ["Sweeper","Doctor","Teacher","Postman","Firefighter"], answer: "Teacher", audio: "assets/question-3.mp3"},
    {text: "Who delivers letters?", options: ["Sweeper","Doctor","Teacher","Postman","Firefighter"], answer: "Postman", audio: "assets/question-4.mp3"},
    {text: "Who helps you during a fire?", options: ["Sweeper","Doctor","Teacher","Postman","Firefighter"], answer: "Firefighter", audio: "assets/question-5.mp3"},
];

let currentQuestion = 0;

const questionEl = document.getElementById("question");
const optionBtns = document.querySelectorAll(".option-btn");
const playAgainBtn = document.getElementById("play-again");
const audioQuestion = document.getElementById("audio-question");
const audioCorrect = document.getElementById("audio-correct");
const audioWrong = document.getElementById("audio-wrong");
const audioClap = document.getElementById("audio-clap");

function loadQuestion() {
    if(currentQuestion >= questions.length){
        questionEl.textContent = "🎉 Well Done! 🎉";
        document.getElementById("options-container").style.display = "none";
        playAgainBtn.style.display = "inline-block";
        return;
    }

    const q = questions[currentQuestion];
    questionEl.textContent = q.text;
    optionBtns.forEach((btn, index) => {
        btn.textContent = q.options[index];
        btn.style.display = q.options[index] ? "inline-block" : "none";
    });
    audioQuestion.src = q.audio;
    audioQuestion.play();
}

optionBtns.forEach(btn => {
    btn.addEventListener("click", ()=>{
        const selected = btn.textContent;
        const correctAnswer = questions[currentQuestion].answer;
        if(selected === correctAnswer){
            audioCorrect.play();
            audioClap.play();
            audioClap.onended = () => {
                currentQuestion++;
                loadQuestion();
            }
        } else {
            audioWrong.play();
        }
    });
});

playAgainBtn.addEventListener("click", () => {
    currentQuestion = 0;
    document.getElementById("options-container").style.display = "block";
    playAgainBtn.style.display = "none";
    loadQuestion();
});

loadQuestion();
</script>

</body>
</html>
