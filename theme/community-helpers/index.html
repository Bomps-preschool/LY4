<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Helpers Game</title>
<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background-color: #fde6e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    #game-container {
        width: 700px;
        background: linear-gradient(to bottom right, #fde6e0, #ffe0d1, #ffd2b3);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        text-align: center;
    }
    #instruction {
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: bold;
    }
    #question {
        font-size: 20px;
        margin-bottom: 20px;
        min-height: 40px;
    }
    .answer-btn {
        display: inline-block;
        padding: 15px 25px;
        margin: 10px;
        font-size: 18px;
        border-radius: 10px;
        background-color: #ffffff;
        border: 2px solid #555;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: all 0.2s ease;
    }
    .answer-btn:hover {
        background-color: #ffd2b3;
    }
    #end-screen {
        display: none;
        font-size: 32px;
        font-weight: bold;
        color: green;
        margin-top: 30px;
    }
    #play-again {
        margin-top: 20px;
        font-size: 20px;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        background-color: #ffeb3b;
        border: none;
    }
</style>
</head>
<body>
<div id="game-container">
    <div id="instruction">Listen to the question and choose the correct answer</div>
    <div id="question">Loading...</div>
    <div id="answers">
        <button class="answer-btn" data-answer="Person">Person</button>
        <button class="answer-btn" data-answer="Place">Place</button>
        <button class="answer-btn" data-answer="Thing">Thing</button>
        <button class="answer-btn" data-answer="Animal">Animal</button>
    </div>
    <div id="end-screen">Good Job!</div>
    <button id="play-again">Play Again</button>
</div>

<audio id="correct-sound" src="assets/claps.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>
<audio id="question-sound"></audio>

<script>
const questions = [
    {sound: 'assets/question-1.mp3', answer: 'Sweeper'},
    {sound: 'assets/question-2.mp3', answer: 'Doctor'},
    {sound: 'assets/question-3.mp3', answer: 'Teacher'},
    {sound: 'assets/question-4.mp3', answer: 'Postman'},
    {sound: 'assets/question-5.mp3', answer: 'Firefighter'}
];

let currentQuestion = 0;
const questionSound = document.getElementById('question-sound');
const correctSound = document.getElementById('correct-sound');
const wrongSound = document.getElementById('wrong-sound');
const questionDiv = document.getElementById('question');
const answers = document.querySelectorAll('.answer-btn');
const endScreen = document.getElementById('end-screen');
const playAgain = document.getElementById('play-again');

function showQuestion() {
    const q = questions[currentQuestion];
    questionDiv.textContent = '';
    questionSound.src = q.sound;
    questionSound.play();
}

answers.forEach(btn => {
    btn.addEventListener('click', () => {
        const q = questions[currentQuestion];
        const selected = btn.textContent;
        if(selected === q.answer) {
            correctSound.play();
            correctSound.onended = () => {
                currentQuestion++;
                if(currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    endScreen.style.display = 'block';
                }
            };
        } else {
            wrongSound.play();
        }
    });
});

playAgain.addEventListener('click', () => {
    currentQuestion = 0;
    endScreen.style.display = 'none';
    showQuestion();
});

window.onload = showQuestion;
</script>
</body>
</html>
