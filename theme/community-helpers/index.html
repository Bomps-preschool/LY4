<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Helper Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #ffe6cc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #game-container {
    width: 90%;
    max-width: 800px;
    text-align: center;
  }
  #logo-slide {
    display: none;
  }
  #logo-slide img {
    width: 200px;
    margin-top: 100px;
  }
  #question-slide {
    display: none;
    background-color: #ffc9b3;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  #instruction {
    font-size: 1.3em;
    font-weight: bold;
    margin-bottom: 20px;
  }
  #question {
    font-size: 1.2em;
    margin-bottom: 20px;
  }
  .answer-btn {
    font-size: 1em;
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #333;
    cursor: pointer;
    background-color: #fff;
  }
  .answer-btn:hover {
    background-color: #f0f0f0;
  }
  #end-slide {
    display: none;
    background-color: #ffedcc;
    padding: 50px;
    border-radius: 20px;
  }
  #end-slide button {
    font-size: 1.2em;
    padding: 12px 20px;
    margin-top: 20px;
    border-radius: 8px;
    cursor: pointer;
    background-color: #fff244;
    border: 1px solid #333;
  }
</style>
</head>
<body>

<div id="game-container">

  <!-- Logo Slide -->
  <div id="logo-slide">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
  </div>

  <!-- Question Slide -->
  <div id="question-slide">
    <div id="instruction">Listen to the question and choose the correct answer</div>
    <div id="question"></div>
    <div id="answers"></div>
  </div>

  <!-- End Slide -->
  <div id="end-slide">
    <h1>Good Job!</h1>
    <button id="play-again">Play Again</button>
  </div>

</div>

<audio id="sound" src=""></audio>
<audio id="correct-sound" src="assets/correct.mp3"></audio>
<audio id="wrong-sound" src="assets/wrong.mp3"></audio>

<script>
const questions = [
  { text: "Who helps you keep the surroundings clean?", answer: "Sweeper", audio: "assets/question-1.mp3" },
  { text: "Who treats sick people?", answer: "Doctor", audio: "assets/question-2.mp3" },
  { text: "Who teaches you at school?", answer: "Teacher", audio: "assets/question-3.mp3" },
  { text: "Who delivers letters?", answer: "Postman", audio: "assets/question-4.mp3" },
  { text: "Who helps you during a fire?", answer: "Firefighter", audio: "assets/question-5.mp3" }
];

let currentIndex = 0;

const logoSlide = document.getElementById("logo-slide");
const questionSlide = document.getElementById("question-slide");
const endSlide = document.getElementById("end-slide");
const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const soundEl = document.getElementById("sound");
const correctSound = document.getElementById("correct-sound");
const wrongSound = document.getElementById("wrong-sound");
const playAgainBtn = document.getElementById("play-again");

function showLogo() {
  logoSlide.style.display = "block";
  questionSlide.style.display = "none";
  endSlide.style.display = "none";
  setTimeout(() => {
    logoSlide.style.display = "none";
    showQuestion();
  }, 5000); // show logo for 5 seconds
}

function showQuestion() {
  if(currentIndex >= questions.length){
    showEnd();
    return;
  }
  const q = questions[currentIndex];
  questionEl.textContent = q.text;
  answersEl.innerHTML = "";

  const options = ["Sweeper","Doctor","Teacher","Postman","Firefighter"];
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.classList.add("answer-btn");
    btn.onclick = () => checkAnswer(opt);
    answersEl.appendChild(btn);
  });

  questionSlide.style.display = "block";
  soundEl.src = q.audio;
  soundEl.play();
}

function checkAnswer(ans){
  const q = questions[currentIndex];
  if(ans === q.answer){
    correctSound.play();
    correctSound.onended = () => {
      currentIndex++;
      showQuestion();
    }
  } else {
    wrongSound.play();
  }
}

function showEnd(){
  questionSlide.style.display = "none";
  endSlide.style.display = "block";
}

playAgainBtn.onclick = () => {
  currentIndex = 0;
  showLogo();
}

// Start the game
showLogo();
</script>

</body>
</html>
