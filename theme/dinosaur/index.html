<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dinosaur Matching Game</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Arial', sans-serif;
    }
    #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        background-size: cover;
        background-position: center;
    }
    .slide {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .visible { display: flex; }
    #slide1 img {
        width: 200px;
    }
    #instruction {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 2vw;
        color: #39FF14;
        text-shadow: 1px 1px 2px black;
    }
    .dino {
        position: absolute;
        width: 120px;
        cursor: pointer;
        transition: transform 1s ease-in, opacity 0.5s ease-in;
    }
    #goodjob {
        font-size: 4vw;
        color: #39FF14;
        text-align: center;
        position: relative;
    }
    /* Confetti animation */
    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: red;
        animation: fall 2s linear infinite;
        opacity: 0.8;
        border-radius: 50%;
    }
    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg);}
        100% { transform: translateY(600px) rotate(360deg);}
    }
</style>
</head>
<body>
<div id="game-container">
    <!-- Slide 1: Logo -->
    <div id="slide1" class="slide visible">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <!-- Slide 2: Game -->
    <div id="slide2" class="slide">
        <div id="instruction">Match the dinosaurs with their names!</div>
        <!-- Dinosaurs and names will be inserted by JS -->
    </div>

    <!-- Slide 3: Good Job -->
    <div id="slide3" class="slide">
        <div id="goodjob">Good Job! 🎉</div>
    </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const dinosaurs = [
    {img:"assets/diplodocus.png", name:"assets/diplodocus-name.png"},
    {img:"assets/triceratops.png", name:"assets/triceratops-name.png"},
    {img:"assets/tyrannosaurus-rex.png", name:"assets/tyrannosaurus-rex-name.png"},
    {img:"assets/iguanodon.png", name:"assets/iguanodon-name.png"},
    {img:"assets/stegosaurus.png", name:"assets/stegosaurus-name.png"},
    {img:"assets/brachiosaurus.png", name:"assets/brachiosaurus-name.png"}
];

let matchedCount = 0;

function createDinosaurs() {
    const slide2 = document.getElementById('slide2');
    const positions = [
        {x:10, y:20},{x:25, y:20},{x:40, y:20},{x:55, y:20},{x:70, y:20},{x:85, y:20},
        {x:15, y:50},{x:30, y:50},{x:45, y:50},{x:60, y:50},{x:75, y:50},{x:90, y:50}
    ];

    dinosaurs.forEach((dino, idx) => {
        // Dinosaur Image
        const dinoImg = document.createElement('img');
        dinoImg.src = dino.img;
        dinoImg.classList.add('dino');
        dinoImg.style.left = positions[idx].x + '%';
        dinoImg.style.top = positions[idx].y + '%';
        dinoImg.dataset.name = dino.name;
        dinoImg.addEventListener('click', handleDinoClick);
        slide2.appendChild(dinoImg);

        // Name Image
        const nameImg = document.createElement('img');
        nameImg.src = dino.name;
        nameImg.classList.add('dino-name');
        nameImg.style.left = positions[idx].x + '%';
        nameImg.style.top = (positions[idx].y + 15) + '%';
        slide2.appendChild(nameImg);
    });
}

function handleDinoClick(e) {
    const clicked = this;
    const correctName = clicked.dataset.name;
    const nameImgs = document.querySelectorAll('.dino-name');
    let matchFound = false;
    nameImgs.forEach(nameImg => {
        if(nameImg.src.includes(correctName.split('/').pop())) {
            matchFound = true;
            clicked.style.transform = 'translateY(-1000px)';
            clicked.style.opacity = '0';
            clicked.style.pointerEvents = 'none';
            nameImg.style.opacity = '0';
            matchedCount++;
            document.getElementById('correctSound').play();
        }
    });

    if(!matchFound) {
        document.getElementById('wrongSound').play();
    }

    if(matchedCount >= dinosaurs.length) {
        setTimeout(() => {
            showSlide(3);
            triggerConfetti();
        }, 800);
    }
}

function showSlide(slideNum) {
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('visible'));
    document.getElementById('slide' + slideNum).classList.add('visible');
}

function triggerConfetti() {
    const slide3 = document.getElementById('slide3');
    for(let i=0;i<50;i++){
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random()*100 + '%';
        confetti.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
        slide3.appendChild(confetti);
    }
}

function startGame() {
    showSlide(1);
    setTimeout(() => {
        document.getElementById('slide1').classList.remove('visible');
        document.getElementById('slide2').classList.add('visible');
        document.getElementById('slide2').style.backgroundImage = "url('assets/background-prehistoric.png')";
        createDinosaurs();
    }, 3000);
}

window.onload = startGame;
</script>
</body>
</html>
