<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinosaur Matching Game</title>
<style>
body, html {
    margin:0; padding:0; overflow:hidden; font-family:'Arial', sans-serif; height:100%; width:100%;
}
#game-container { width:100%; height:100%; position:relative; overflow:hidden; }

/* Slides */
.slide { width:100%; height:100%; position:absolute; top:0; left:0; display:none; justify-content:center; align-items:center; flex-direction:column; }
.visible { display:flex; }

#slide1 img { width:30vw; max-width:250px; height:auto; }
#instruction { position:absolute; top:2%; width:96%; text-align:center; font-size:4vw; max-font-size:28px; color:#39FF14; text-shadow:1px 1px 2px black; }

/* Dinosaur images */
.dino { width:18vw; max-width:150px; cursor:grab; transition: transform 0.5s ease; position:absolute; }
.name-box { width:18vw; max-width:150px; height:15vw; max-height:100px; border:2px dashed #555; display:flex; justify-content:center; align-items:center; margin:1%; font-size:3vw; max-font-size:18px; font-weight:bold; color:#222; position:absolute; }
img.name-img { max-width:100%; max-height:100%; }

#goodjob { font-size:6vw; color:#39FF14; text-align:center; position:relative; }

@media(max-width:768px){
    .dino { width:28vw; max-width:120px; }
    .name-box { width:28vw; max-width:120px; height:22vw; max-height:90px; font-size:4vw; }
    #instruction { font-size:5vw; }
    #goodjob { font-size:10vw; }
}
</style>
</head>
<body>
<div id="game-container">
    <div id="slide1" class="slide visible">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <div id="slide2" class="slide">
        <div id="instruction">Match the dinosaurs with their names!</div>
    </div>

    <div id="slide3" class="slide">
        <div id="goodjob">Good Job! 🎉</div>
    </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const dinosaurs = [
    {id: 'diplodocus', img: 'assets/diplodocus.png', nameImg: 'assets/diplodocus-name.png'},
    {id: 'triceratops', img: 'assets/triceratops.png', nameImg: 'assets/triceratops-name.png'},
    {id: 'tyrannosaurus-rex', img: 'assets/tyrannosaurus-rex.png', nameImg: 'assets/tyrannosaurus-rex-name.png'},
    {id: 'iguanodon', img: 'assets/iguanodon.png', nameImg: 'assets/iguanodon-name.png'},
    {id: 'stegosaurus', img: 'assets/stegosaurus.png', nameImg: 'assets/stegosaurus-name.png'},
    {id: 'brachiosaurus', img: 'assets/brachiosaurus.png', nameImg: 'assets/brachiosaurus-name.png'}
];

let matchesDone = 0;

function shuffleArray(arr) { return arr.sort(()=>Math.random()-0.5); }

function createGame() {
    const slide2 = document.getElementById('slide2');
    slide2.style.backgroundImage = "url('assets/background-prehistoric.png')";
    slide2.style.backgroundSize = "cover";

    const topPositions = [10, 25, 40, 55, 70, 85];
    const dinoY = 10; // top row %
    const nameY = 70; // bottom row %

    const shuffledDinos = shuffleArray([...dinosaurs]);
    const shuffledNames = shuffleArray([...dinosaurs]);

    shuffledDinos.forEach((dino, idx) => {
        const img = document.createElement('img');
        img.src = dino.img;
        img.classList.add('dino');
        img.style.left = topPositions[idx] + '%';
        img.style.top = dinoY + '%';
        img.dataset.id = dino.id;
        img.draggable = true;
        img.addEventListener('dragstart', dragStart);
        slide2.appendChild(img);
    });

    shuffledNames.forEach((dino, idx) => {
        const box = document.createElement('div');
        box.classList.add('name-box');
        box.style.left = topPositions[idx] + '%';
        box.style.top = nameY + '%';
        box.dataset.id = dino.id;

        const nameImg = document.createElement('img');
        nameImg.src = dino.nameImg;
        nameImg.classList.add('name-img');
        box.appendChild(nameImg);

        box.addEventListener('dragover', dragOver);
        box.addEventListener('drop', dropDino);
        slide2.appendChild(box);
    });
}

let draggedDino = null;

function dragStart(e) { draggedDino = this; }
function dragOver(e) { e.preventDefault(); }

function dropDino(e) {
    const targetBox = this;
    if(draggedDino.dataset.id === targetBox.dataset.id){
        document.getElementById('correctSound').play();
        matchesDone++;
        draggedDino.style.transition = 'top 0.5s ease, left 0.5s ease, opacity 0.5s ease';
        draggedDino.style.left = targetBox.offsetLeft + 'px';
        draggedDino.style.top = targetBox.offsetTop + 'px';
        setTimeout(()=>{
            draggedDino.style.display='none';
            targetBox.style.display='none';
        },600);
        if(matchesDone === dinosaurs.length){
            setTimeout(()=>showSlide(3),800);
        }
    } else {
        document.getElementById('wrongSound').play();
    }
}

function showSlide(slideNum){
    document.querySelectorAll('.slide').forEach(s=>s.classList.remove('visible'));
    document.getElementById('slide'+slideNum).classList.add('visible');
}

function startGame(){
    showSlide(1);
    setTimeout(()=>{
        document.getElementById('slide1').classList.remove('visible');
        document.getElementById('slide2').classList.add('visible');
        createGame();
    },3000);
}

window.onload = startGame;
</script>
</body>
</html>
