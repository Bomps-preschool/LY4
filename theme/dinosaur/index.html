<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dinosaur Match Game</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Arial', sans-serif;
    }
    #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        background-size: cover;
        background-position: center;
    }
    .slide {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .visible { display: flex; }
    #slide1 img {
        width: 250px;
    }
    #instruction {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        font-size: 2vw;
        color: #39FF14;
        text-shadow: 1px 1px 2px black;
    }
    .dino {
        position: absolute;
        width: 120px;
        cursor: pointer;
        transition: transform 0.8s ease-in, opacity 0.8s;
    }
    #goodjob {
        font-size: 4vw;
        color: #39FF14;
        text-align: center;
    }
    .confetti {
        position: absolute;
        width: 15px;
        height: 15px;
        background-color: red;
        opacity: 0.8;
        border-radius: 50%;
        animation: fall 2s linear infinite;
    }
    @keyframes fall {
        0% {transform: translateY(0) rotate(0deg);}
        100% {transform: translateY(600px) rotate(360deg);}
    }
</style>
</head>
<body>
<div id="game-container">
    <!-- Slide 1: Logo -->
    <div id="slide1" class="slide visible">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <!-- Slide 2: Game -->
    <div id="slide2" class="slide">
        <div id="instruction">Match the dinosaur to its name!</div>
        <!-- Dinosaur images and names will be added by JS -->
    </div>

    <!-- Slide 3: Good Job -->
    <div id="slide3" class="slide">
        <div id="goodjob">Good Job! 🎉</div>
    </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
// Dinosaur assets
const dinosaurs = [
    {img:'diplodocus.png', name:'diplodocus-name.png'},
    {img:'triceratops.png', name:'triceratops-name.png'},
    {img:'tyrannosaurus-rex.png', name:'tyrannosaurus-rex-name.png'},
    {img:'iguanodon.png', name:'iguanodon-name.png'},
    {img:'stegosaurus.png', name:'stegosaurus-name.png'},
    {img:'brachiosaurus.png', name:'brachiosaurus-name.png'}
];

let correctIndex = Math.floor(Math.random() * dinosaurs.length);

function createDinos() {
    const slide2 = document.getElementById('slide2');
    dinosaurs.forEach((dino, idx) => {
        const dinoImg = document.createElement('img');
        dinoImg.src = `assets/${dino.img}`;
        dinoImg.classList.add('dino');
        dinoImg.style.left = (15 + idx*14) + '%';
        dinoImg.style.top = '50%';
        dinoImg.dataset.idx = idx;
        dinoImg.addEventListener('click', handleClick);
        slide2.appendChild(dinoImg);

        const nameImg = document.createElement('img');
        nameImg.src = `assets/${dino.name}`;
        nameImg.style.position = 'absolute';
        nameImg.style.top = '75%';
        nameImg.style.left = (15 + idx*14) + '%';
        nameImg.style.width = '100px';
        slide2.appendChild(nameImg);
    });
}

function handleClick(e) {
    const clickedIdx = parseInt(this.dataset.idx);
    if (clickedIdx === correctIndex) {
        document.getElementById('correctSound').play();
        this.style.transform = 'translateY(-800px)';
        this.style.opacity = '0';
        setTimeout(() => {
            showSlide(3);
            createConfetti();
        }, 800);
    } else {
        document.getElementById('wrongSound').play();
    }
}

function createConfetti() {
    const slide3 = document.getElementById('slide3');
    for(let i=0;i<50;i++){
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random()*100+'%';
        confetti.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
        slide3.appendChild(confetti);
    }
}

function showSlide(slideNum) {
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('visible'));
    document.getElementById('slide' + slideNum).classList.add('visible');
}

function startGame() {
    showSlide(1);
    setTimeout(() => {
        document.getElementById('slide1').classList.remove('visible');
        document.getElementById('slide2').classList.add('visible');
        createDinos();
    }, 3000);
}

window.onload = startGame;
</script>
</body>
</html>
